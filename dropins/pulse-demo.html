<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pulse</title>
  <!-- Drop-in metadata (all optional) -->
  <meta name="sigil:id" content="pulse-demo">
  <meta name="sigil:name" content="PULSE">
  <meta name="sigil:color" content="#b47cff">
  <meta name="sigil:description" content="RESONANT TAP TOY">
  <meta name="sigil:order" content="500">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #070510; }
    body { display: flex; align-items: center; justify-content: center; font-family: 'Courier New', monospace; }
    canvas { width: 100%; height: 100%; display: block; }
    .hint {
      position: absolute; bottom: 13%; left: 0; right: 0; text-align: center;
      color: rgba(180, 124, 255, 0.5); letter-spacing: 0.32em; font-size: 12px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="hint">TAP ANYWHERE · CROSS THE RIPPLES</div>
  <script>
    // A resonant tap toy. Each tap emits an expanding ring tuned to a pentatonic
    // note on a rotating "instrument" (waveform + filter), with its own color.
    // When two rings' fronts intersect they spark and chime. Self-contained,
    // offline, Web-Audio only. Authored in 720 space; the host scales to the panel.
    const canvas = document.getElementById('c')
    const ctx = canvas.getContext('2d')
    const SIZE = 720
    canvas.width = SIZE
    canvas.height = SIZE

    // ── audio ──────────────────────────────────────────────────────────
    let audio = null, master = null
    function ac() {
      if (!audio) {
        audio = new (window.AudioContext || window.webkitAudioContext)()
        master = audio.createGain(); master.gain.value = 0.5; master.connect(audio.destination)
      }
      if (audio.state === 'suspended') audio.resume()
      return audio
    }
    // C minor pentatonic across three octaves (semitone offsets from C3=130.81Hz).
    const ROOT = 130.81, SCALE = [0, 3, 5, 7, 10]
    const NOTES = []
    for (let oct = 0; oct < 3; oct++) for (const s of SCALE) NOTES.push(ROOT * Math.pow(2, (oct * 12 + s) / 12))
    // Four "instruments": waveform + filter character.
    const INSTR = [
      { wave: 'sine',     cut: 2600, q: 2,  vol: 0.30 },
      { wave: 'triangle', cut: 1800, q: 3,  vol: 0.26 },
      { wave: 'square',   cut: 1200, q: 6,  vol: 0.16 },
      { wave: 'sawtooth', cut: 2200, q: 8,  vol: 0.14 }
    ]
    function voice(freq, instr, dur, peak) {
      try {
        const a = ac(), t = a.currentTime
        const o = a.createOscillator(); o.type = instr.wave; o.frequency.value = freq
        const f = a.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = instr.cut; f.Q.value = instr.q
        const g = a.createGain(); g.gain.value = 0.0001
        g.gain.exponentialRampToValueAtTime(peak, t + 0.015)
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur)
        o.connect(f); f.connect(g); g.connect(master)
        o.start(t); o.stop(t + dur + 0.05)
      } catch (e) {}
    }

    // ── pulses ────────────────────────────────────────────────────────
    const rings = []
    const sparks = []
    let uid = 0, seq = 0
    function toLocal(clientX, clientY) {
      const r = canvas.getBoundingClientRect()
      return { x: (clientX - r.left) / r.width * SIZE, y: (clientY - r.top) / r.height * SIZE }
    }
    function emit(x, y) {
      const i = seq++
      const instr = INSTR[i % INSTR.length]
      const noteIdx = (i * 3 + (Math.random() * 2 | 0)) % NOTES.length
      const freq = NOTES[noteIdx]
      // color: spread hues by the golden angle so consecutive taps differ; tie
      // lightness loosely to pitch so higher notes read brighter.
      const hue = (i * 47) % 360
      const light = 54 + (noteIdx / NOTES.length) * 18
      rings.push({ id: uid++, x, y, r: 6, a: 1, hue, sat: 88, light, w: 2 + (INSTR.indexOf(instr)) * 0.7, freq, instr, hits: new Set() })
      voice(freq, instr, 0.7, instr.vol)
    }
    canvas.addEventListener('pointerdown', e => { const p = toLocal(e.clientX, e.clientY); emit(p.x, p.y) })

    function spark(x, y, hue) {
      sparks.push({ x, y, r: 3, a: 1, hue })
      for (let k = 0; k < 6; k++) {
        const ang = Math.random() * Math.PI * 2, sp = 2 + Math.random() * 3
        sparks.push({ x, y, r: 1.5, a: 1, hue, vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp, ray: true })
      }
    }
    // two expanding rings intersect when |rA-rB| <= dist(centers) <= rA+rB
    function collide() {
      for (let i = 0; i < rings.length; i++) {
        const A = rings[i]
        for (let j = i + 1; j < rings.length; j++) {
          const B = rings[j]
          if (A.hits.has(B.id)) continue
          const dx = A.x - B.x, dy = A.y - B.y
          const d = Math.hypot(dx, dy)
          if (d <= A.r + B.r && d >= Math.abs(A.r - B.r) && d > 1) {
            A.hits.add(B.id); B.hits.add(A.id)
            // intersection point along the center line
            const t = (d * d + A.r * A.r - B.r * B.r) / (2 * d * d)
            const px = B.x + dx * t, py = B.y + dy * t
            const h = (A.hue + B.hue) / 2
            spark(px, py, h)
            // a bright bell — a perfect-fifth stack above the higher note
            const base = Math.max(A.freq, B.freq)
            voice(base * 2, INSTR[0], 0.35, 0.22)
            voice(base * 3, INSTR[1], 0.28, 0.12)
          }
        }
      }
    }

    function frame() {
      ctx.fillStyle = 'rgba(7, 5, 16, 0.22)'
      ctx.fillRect(0, 0, SIZE, SIZE)

      for (let i = rings.length - 1; i >= 0; i--) {
        const R = rings[i]
        R.r += 5.5
        R.a -= 0.010
        if (R.a <= 0 || R.r > SIZE) { rings.splice(i, 1); continue }
        ctx.beginPath()
        ctx.arc(R.x, R.y, R.r, 0, Math.PI * 2)
        ctx.strokeStyle = `hsla(${R.hue}, ${R.sat}%, ${R.light}%, ${R.a})`
        ctx.lineWidth = R.w
        ctx.shadowColor = `hsla(${R.hue}, 90%, 60%, ${R.a * 0.8})`
        ctx.shadowBlur = 10
        ctx.stroke()
        ctx.shadowBlur = 0
        // a soft dot at the origin
        ctx.beginPath(); ctx.arc(R.x, R.y, 2.5, 0, Math.PI * 2)
        ctx.fillStyle = `hsla(${R.hue}, 90%, 70%, ${R.a})`; ctx.fill()
      }

      collide()

      for (let i = sparks.length - 1; i >= 0; i--) {
        const s = sparks[i]
        s.a -= s.ray ? 0.05 : 0.04
        if (s.ray) { s.x += s.vx; s.y += s.vy; s.vx *= 0.92; s.vy *= 0.92 }
        else { s.r += 1.4 }
        if (s.a <= 0) { sparks.splice(i, 1); continue }
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2)
        ctx.fillStyle = `hsla(${s.hue}, 95%, 74%, ${s.a})`
        ctx.shadowColor = `hsla(${s.hue}, 95%, 65%, ${s.a})`; ctx.shadowBlur = 14
        ctx.fill(); ctx.shadowBlur = 0
      }

      requestAnimationFrame(frame)
    }
    frame()
  </script>
</body>
</html>
