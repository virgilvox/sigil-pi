  :root{
    --hb-pink:#FE0386; --hb-cream:#f5f0e6; --hb-ink:#1a1a1a;
    --lc-paper:#f5f2eb; --lc-ink:#141310; --lc-teal:#0d9488; --lc-blue:#8ED3EF;
    --dv-bg0:#16212a; --dv-bg1:#0b0f14; --dv-teal:#4db3a8;
    --panel:#141414; --panel-line:#2b2b2b; --paper-soft:#f5f2eb;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:#000; color:#fff;
    font-family:'IBM Plex Mono',ui-monospace,monospace;
    display:grid; place-items:center; overflow:hidden;
    user-select:none; -webkit-user-select:none;
    overscroll-behavior:none;
  }

  /* The round panel surface. 1vmin == 1% of this square on any square/round screen. */
  .stage{
    position:relative;
    width:min(100vw,100vh); height:min(100vw,100vh);
    border-radius:50%; overflow:hidden;
    background:#000; isolation:isolate;
    --ctrl:#1a1a1a; --ctrl-soft:rgba(26,26,26,.12); --ctrl-line:rgba(26,26,26,.34);
  }
  .stage[data-mode="dark"]{
    --ctrl:#f5f2eb; --ctrl-soft:rgba(245,242,235,.12); --ctrl-line:rgba(245,242,235,.42);
  }
  /* subtle film grain over everything */
  .stage::after{
    content:''; position:absolute; inset:0; pointer-events:none; z-index:40; opacity:.05;
    mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  .track{ display:flex; height:100%; width:100%; will-change:transform;
    transition:transform .42s cubic-bezier(.16,1,.3,1); touch-action:none; }
  .track.dragging{ transition:none; }

  .panel{ flex:0 0 100%; height:100%; position:relative;
    display:grid; place-items:center; overflow:hidden; }

  /* ---- per-brand backgrounds ---- */
  .bg-deveco{ background:radial-gradient(125% 125% at 50% 34%, var(--dv-bg0) 0%, var(--dv-bg1) 68%); }
  .bg-hb{ background:var(--hb-cream); }
  .bg-hb::before{ /* faint halftone, safely under the white cards */
    content:''; position:absolute; inset:0; pointer-events:none; opacity:.06;
    background-image:radial-gradient(var(--hb-ink) 1.1px, transparent 1.3px);
    background-size:12px 12px; background-position:6px 6px;
  }
  .bg-lumen{ background:var(--lc-paper); }
  .bg-lumen::before{ /* faint print grid */
    content:''; position:absolute; inset:0; pointer-events:none; opacity:.05;
    background-image:linear-gradient(var(--lc-ink) 1px,transparent 1px),linear-gradient(90deg,var(--lc-ink) 1px,transparent 1px);
    background-size:26px 26px; background-position:center;
  }

  .card{ display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:4.6vmin; width:74vmin; max-width:74vmin; text-align:center; z-index:5; }

  /* ---- marks ---- */
  .mark-deveco{ height:40vmin; width:auto; filter:drop-shadow(0 2vmin 3vmin rgba(0,0,0,.45)); }
  .mark-hb{ width:34vmin; height:34vmin; }
  .mark-lc{ width:29vmin; height:29vmin; display:block;
    box-shadow:1.1vmin 1.1vmin 0 rgba(20,19,16,.9); }

  /* ---- wordmarks (outlined vector — font-independent, offline-safe) ---- */
  .wm-svg{ display:block; height:auto; }
  .wm-svg.deveco{ width:42vmin; }
  .wm-svg.hb{ width:60vmin; }
  .wm-svg.lc{ width:63vmin; }

  /* ---- QR ---- */
  .qrwrap{ position:relative; }
  .qrwrap::before{ content:''; position:absolute; inset:0; transform:translate(1.6vmin,1.6vmin); z-index:0; }
  .qrwrap.pink::before{ background:var(--hb-pink); }
  .qrwrap.teal::before{ background:var(--lc-teal); }
  .qrtile{ position:relative; z-index:1; padding:2.6vmin; border:0.55vmin solid var(--hb-ink); }
  .qrwrap.teal .qrtile{ border-color:var(--lc-ink); }
  .qrsvg{ display:block; width:46vmin; height:46vmin; image-rendering:pixelated; }
  .qrcap{ display:flex; align-items:center; gap:2vmin; }
  .qrcap .ig{ width:6.4vmin; height:6.4vmin; flex:0 0 auto; }
  .cap-svg{ display:block; width:auto; }
  .qrcap.hb .cap-svg{ height:7vmin; }
  .qrcap.ig-hb .cap-svg{ height:6vmin; }
  .qrcap.ig-lc .cap-svg{ height:4.6vmin; }

  /* lumen registration marks (placed inside the circle, not the clipped square corners) */
  .reg{ position:absolute; width:5vmin; height:5vmin; z-index:3; color:var(--lc-teal); opacity:.85; pointer-events:none; }
  .reg.tl{ top:16vmin; left:16vmin; } .reg.tr{ top:16vmin; right:16vmin; }
  .reg.bl{ bottom:16vmin; left:16vmin; } .reg.br{ bottom:16vmin; right:16vmin; }

  /* ---------- overlay controls ---------- */
  .topbtn{
    position:absolute; top:5.4vmin; left:50%; transform:translateX(-50%); z-index:30;
    width:10vmin; height:10vmin; border-radius:50%;
    display:grid; place-items:center; cursor:pointer;
    color:var(--ctrl); background:var(--ctrl-soft);
    border:0.4vmin solid var(--ctrl-line);
    -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px);
    transition:transform .15s ease, background .2s ease;
  }
  .topbtn:active{ transform:translateX(-50%) scale(.9); }
  .topbtn svg{ width:5vmin; height:5vmin; }

  .dots{
    position:absolute; bottom:6.4vmin; left:50%; transform:translateX(-50%); z-index:30;
    display:flex; gap:2.1vmin; align-items:center;
  }
  .dot{ width:2vmin; height:2vmin; border-radius:50%;
    background:var(--ctrl); opacity:.32; cursor:pointer;
    transition:opacity .2s ease, width .2s ease, border-radius .2s ease; }
  .dot.on{ opacity:1; width:5.4vmin; border-radius:1vmin; }

  .hint{
    position:absolute; bottom:12.4vmin; left:50%; transform:translateX(-50%); z-index:29;
    font-family:'IBM Plex Mono',monospace; font-size:2.5vmin; letter-spacing:.28em;
    color:var(--ctrl); opacity:.42; text-transform:uppercase; pointer-events:none;
    transition:opacity .5s ease; white-space:nowrap;
  }
  .hint.gone{ opacity:0; }

  /* ---------- grid picker overlay ---------- */
  .menu{
    position:absolute; inset:0; z-index:50; display:grid; place-items:center;
    background:rgba(8,8,8,.78); -webkit-backdrop-filter:blur(9px); backdrop-filter:blur(9px);
    opacity:0; visibility:hidden; transition:opacity .22s ease, visibility .22s ease;
  }
  .menu.open{ opacity:1; visibility:visible; }
  .menu-inner{ width:74vmin; display:flex; flex-direction:column; align-items:center; gap:2.4vmin;
    transform:scale(.94); transition:transform .24s cubic-bezier(.16,1,.3,1); }
  .menu.open .menu-inner{ transform:scale(1); }
  .menu-title{ font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:3.1vmin;
    letter-spacing:.36em; color:#f5f2eb; text-transform:uppercase; opacity:.9; }
  .grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:1.8vmin; width:70vmin; }
  .tile{
    background:var(--panel); border:0.3vmin dashed var(--panel-line);
    border-radius:1.2vmin; padding:1.5vmin 0.7vmin; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:0.9vmin;
    transition:border-color .18s ease, transform .12s ease, background .18s ease;
  }
  .tile:active{ transform:scale(.95); }
  .tile.cur{ border-color:var(--dv-teal); border-style:solid; background:#181a1a; }
  .tile .ico{ width:6.8vmin; height:6.8vmin; display:grid; place-items:center; }
  .tile .ico svg{ max-width:100%; max-height:100%; }
  .tile .ico .lcbox{ box-shadow:0 0 0 .3vmin rgba(245,242,235,.25); }
  .tile .ico .ddr-ico-img, .tile .ico .zeen-ico-img{ width:100%; height:100%; object-fit:cover; border-radius:.9vmin; }
  .tile .name{ font-family:'IBM Plex Mono',monospace; font-weight:500; font-size:1.5vmin;
    letter-spacing:0; color:#e7e7e7; text-align:center; line-height:1.08;
    max-height:3.4vmin; overflow:hidden; word-break:break-word; }
  .tile .name .k{ color:var(--dv-teal); }
  .menu-close{
    font-family:'IBM Plex Mono',monospace; font-size:2.6vmin; letter-spacing:.3em;
    color:#f5f2eb; opacity:.6; cursor:pointer; padding:1vmin 3vmin;
    border:0.35vmin solid rgba(245,242,235,.28); border-radius:6vmin; text-transform:uppercase;
  }
  .menu-close:active{ opacity:1; }

  /* ---- Doot / DDR / LATCH ---- */
  .bg-doot{
    background:
      radial-gradient(120% 95% at 50% 40%, rgba(255,255,255,.5) 0%, rgba(255,255,255,0) 52%),
      repeating-conic-gradient(from 0deg at 50% 40%, #b7abef 0deg 5deg, #a99cea 5deg 10deg),
      linear-gradient(#b9c7f7, #ab9eec);
  }
  .bg-ddr{ background:linear-gradient(#b7c9fb, #ab9df4); }
  .bg-latch{ background:#121212; }
  .bg-latch::before{ content:''; position:absolute; inset:0; pointer-events:none; opacity:.06;
    background-image:radial-gradient(rgba(245,242,235,.9) 1px, transparent 1.4px); background-size:22px 22px; }

  .mark-doot{ width:32vmin; height:32vmin; filter:drop-shadow(0 1.6vmin 2.4vmin rgba(70,45,110,.3)); }
  .mark-latch{ width:33vmin; height:33vmin; }

  .wordart{ line-height:0; display:flex; justify-content:center; }
  .wordart svg{ width:100%; height:auto; display:block; }
  .wa-deveco{ width:46vmin; } .wa-hb{ width:52vmin; } .wa-lumen{ width:57vmin; }
  .wa-doot{ width:44vmin; } .wa-latch{ width:45vmin; }

  .ddr-img{ width:63vmin; max-width:63vmin; height:auto; display:block; border-radius:3vmin;
    box-shadow:0 2vmin 4vmin rgba(60,40,90,.3); }
  .ddr-link{ font-family:'Fredoka',sans-serif; font-weight:600; font-size:5vmin; color:#3a2f6b; letter-spacing:.01em; }

  .qrwrap.orange::before{ background:#FF5A33; }
  .qrwrap.orange .qrtile{ border-color:#241d33; }
  .qrcap.doot .txt{ font-family:'Fredoka',sans-serif; font-weight:600; font-size:5vmin; color:#3a2f6b; }
  .qrcap.doot .dootmini{ width:6.6vmin; height:6.6vmin; flex:0 0 auto; }
  .qrcap.ghub{ color:#241d33; }
  .qrcap.ghub .gh{ width:5.4vmin; height:5.4vmin; flex:0 0 auto; }
  .qrcap.ghub .txt{ font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:3vmin; color:#241d33; }

  /* ---- Zeenster ---- */
  .bg-zeen{ background:#F3EBD4; }
  .zeen-card{ gap:5vmin; }
  .zeen-press{ width:34vmin; height:auto; display:block; filter:drop-shadow(0 1.4vmin 2.2vmin rgba(120,95,40,.18)); }
  .zeen-header{ width:60vmin; height:auto; display:block; }
  .qrwrap.zeen::before{ background:#2FA36B; }
  .qrwrap.zeen .qrtile{ border-color:#2a2018; }

  /* ---- autoplay controls ---- */
  .autoplay{ display:flex; flex-direction:column; align-items:center; gap:1.4vmin; }
  .ap-btn{ font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:2vmin; letter-spacing:.16em;
    text-transform:uppercase; color:#f5f2eb; background:transparent; cursor:pointer;
    border:0.35vmin solid rgba(245,242,235,.3); border-radius:6vmin; padding:1.3vmin 3.2vmin; }
  .ap-btn.on{ background:var(--dv-teal); border-color:var(--dv-teal); color:#08110f; }
  .ap-ints{ display:flex; gap:1.3vmin; }
  .ap-ints button{ font-family:'IBM Plex Mono',monospace; font-weight:500; font-size:1.85vmin;
    color:#cfcfcf; background:#191919; border:0.3vmin solid #2b2b2b; border-radius:1.1vmin;
    padding:.9vmin 1.9vmin; cursor:pointer; }
  .ap-ints button.on{ color:#08110f; background:var(--dv-teal); border-color:var(--dv-teal); font-weight:700; }

  /* ---- touch behaviour ---- */
  html,body{ overscroll-behavior:none; overflow:hidden; touch-action:none; }
  .stage{ -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; }
  .track,.panel,.card{ touch-action:none; }
  .topbtn,.menu-close,.tile,.dot,.ap-btn,.ap-ints button{ touch-action:manipulation; }
  .card img,.card svg{ -webkit-user-drag:none; user-select:none; pointer-events:none; }
</style>
</head>

// LumenCanvas mark (self-contained black tile: black square, white L, blue beam)
function lumen(cls){
  return `<svg class="${cls||''}" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect x="0" y="0" width="100" height="100" fill="#000"/>
    <rect x="0" y="0" width="50" height="100" fill="#fff"/>
    <rect x="50" y="50" width="50" height="50" fill="#fff"/>
    <polygon points="0,0 50,50 0,100" fill="#8ED3EF"/></svg>`;
}

// Instagram glyph (line style, tinted per brand — deliberately not the IG gradient)
function igGlyph(color, cls){
  return `<svg class="${cls||''}" viewBox="0 0 100 100" fill="none" stroke="${color}" stroke-width="7" stroke-linejoin="round">
    <rect x="14" y="14" width="72" height="72" rx="22"/>
    <circle cx="50" cy="50" r="17"/>
    <circle cx="72.5" cy="27.5" r="4.6" fill="${color}" stroke="none"/></svg>`;
}

function qrTile(q, moduleColor, tileColor, accent){
  return `<div class="qrwrap ${accent}">
    <div class="qrtile" style="background:${tileColor}">
      <svg class="qrsvg" viewBox="0 0 ${q.vb} ${q.vb}" xmlns="http://www.w3.org/2000/svg">
        <path d="${q.d}" fill="${moduleColor}" shape-rendering="crispEdges"/></svg>
    </div></div>`;
}

function regMarks(){
  const b = `<svg class="reg REGPOS" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 8V2h6"/></svg>`;
  return ['tl','tr','bl','br'].map(p=>{
    let d = p==='tl' ? 'M2 8V2h6' : p==='tr' ? 'M22 8V2h-6' : p==='bl' ? 'M2 16v6h6' : 'M22 16v6h-6';
    return `<svg class="reg ${p}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="${d}"/></svg>`;
  }).join('');
}

/* ---------------- build carousel (with clones for seamless wrap) ---------------- */
const track = document.getElementById('track');
const stage = document.getElementById('stage');
const N = SLIDES.length;

function panelHTML(def){ return `<section class="panel ${def.bg}" data-mode="${def.mode}">${def.body()}</section>`; }
const order = [SLIDES[N-1], ...SLIDES, SLIDES[0]];   // clone last at front, first at end
track.innerHTML = order.map(panelHTML).join('');

let pos = 1;                 // physical index into `order`; 1 == first real slide
function realFromPos(p){ return ((p - 1) % N + N) % N; }   // always a valid slide index

function setTransform(animate){
  track.classList.toggle('dragging', !animate);
  track.style.transform = `translate3d(${-pos*100}%,0,0)`;
}

function syncChrome(){
  const real = realFromPos(pos);
  stage.dataset.mode = SLIDES[real].mode;
  dotEls.forEach((d,i)=>d.classList.toggle('on', i===real));
  tileEls.forEach((t,i)=>t.classList.toggle('cur', i===real));
}

function move(target){
  pos = target;
  setTransform(true);
  syncChrome();
}

// after a slide onto a clone, snap to the real twin without animation
track.addEventListener('transitionend', (e)=>{
  if(e.propertyName!=='transform') return;
  if(pos===N+1){ pos=1; jump(); }
  else if(pos===0){ pos=N; jump(); }
});
function jump(){
  track.style.transition='none';
  setTransform(false);
  // force reflow, then restore transition
  void track.offsetWidth;
  track.style.transition='';
  track.classList.remove('dragging');
  syncChrome();
}

// if resting on (or heading onto) a clone, snap to its real twin first — no animation, visually identical
function normalizeClone(){
  if(pos===N+1){ pos=1; jump(); }
  else if(pos===0){ pos=N; jump(); }
}
function next(){ normalizeClone(); move(pos+1); }
function prev(){ normalizeClone(); move(pos-1); }
function goReal(i){ normalizeClone(); move(i+1); }

/* ---------------- dots ---------------- */
const dotsWrap = document.getElementById('dots');
const dotEls = SLIDES.map((_,i)=>{
  const d=document.createElement('div'); d.className='dot';
  d.addEventListener('click', ()=>{ hideHint(); goReal(i); apReset(); });
  dotsWrap.appendChild(d); return d;
});

/* ---------------- grid picker ---------------- */
const menu = document.getElementById('menu');
const grid = document.getElementById('grid');
const tileEls = SLIDES.map((def,i)=>{
  const t=document.createElement('button'); t.className='tile';
  t.innerHTML = `<div class="ico">${def.icon()}</div><div class="name">${def.name()}</div>`;
  t.addEventListener('click', ()=>{ closeMenu(); goReal(i); });
  grid.appendChild(t); return t;
});
function openMenu(){ menu.classList.add('open'); apClear(); }
function closeMenu(){ menu.classList.remove('open'); apStart(); }
document.getElementById('menuBtn').addEventListener('click', ()=>{ hideHint(); openMenu(); });
document.getElementById('menuClose').addEventListener('click', closeMenu);
menu.addEventListener('click', (e)=>{ if(e.target===menu) closeMenu(); });

/* ---------------- autoplay (auto-cycle) ---------------- */
let apOn=false, apSec=10, apTimer=null;
const apToggle=document.getElementById('apToggle');
const apInts=document.getElementById('apInts');
function apClear(){ if(apTimer){ clearInterval(apTimer); apTimer=null; } }
function apStart(){ apClear(); if(apOn && !menu.classList.contains('open')){ apTimer=setInterval(next, apSec*1000); } }
function apReset(){ if(apOn && !menu.classList.contains('open')) apStart(); }   // restart countdown after a manual move
apToggle.addEventListener('click', ()=>{
  apOn=!apOn;
  apToggle.textContent='Auto-cycle: '+(apOn?'On':'Off');
  apToggle.setAttribute('aria-pressed', apOn?'true':'false');
  apToggle.classList.toggle('on', apOn);
  apStart();
});
apInts.addEventListener('click', (e)=>{
  const b=e.target.closest('button[data-sec]'); if(!b) return;
  apSec=parseInt(b.dataset.sec,10);
  [...apInts.children].forEach(c=>c.classList.toggle('on', c===b));
  apStart();
});

/* ---------------- swipe / drag (touch + pointer + mouse) ---------------- */
let dragging=false, startX=0, startY=0, dx=0, w=0, axis=null, activeId=null;
function dragStart(x,y){
  if(menu.classList.contains('open')) return false;
  normalizeClone();                            // clear any resting clone so neighbours always exist
  dragging=true; startX=x; startY=y; dx=0; axis=null; w=stage.clientWidth||1;
  track.classList.add('dragging'); hideHint(); return true;
}
function dragMove(x,y){
  if(!dragging) return;
  const mx=x-startX, my=y-startY;
  if(axis===null && (Math.abs(mx)>6 || Math.abs(my)>6)) axis = Math.abs(mx)>=Math.abs(my) ? 'x':'y';
  if(axis!=='x') return;                       // ignore mostly-vertical drags
  dx=mx;
  track.style.transform=`translate3d(${-pos*100 + (dx/w)*100}%,0,0)`;
}
function dragEnd(){
  if(!dragging) return;
  dragging=false; activeId=null;
  const threshold=Math.min(w*0.12, 80);
  if(axis==='x' && dx<=-threshold) next();     // swipe left -> forward
  else if(axis==='x' && dx>=threshold) prev(); // swipe right -> back
  else move(pos);                              // tap / too short -> snap back
  axis=null; apReset();
}

if(window.PointerEvent){
  track.addEventListener('pointerdown',(e)=>{
    if(e.pointerType==='mouse' && e.button!==0) return;
    if(dragStart(e.clientX,e.clientY)){ activeId=e.pointerId; try{ track.setPointerCapture(e.pointerId); }catch(_){}}
  });
  track.addEventListener('pointermove',(e)=>{
    if(!dragging || (activeId!==null && e.pointerId!==activeId)) return;
    dragMove(e.clientX,e.clientY);
    if(axis==='x' && e.cancelable) e.preventDefault();
  },{passive:false});
  track.addEventListener('pointerup', dragEnd);
  track.addEventListener('pointercancel', dragEnd);
  track.addEventListener('lostpointercapture', dragEnd);
}else{
  track.addEventListener('touchstart',(e)=>{ const t=e.changedTouches[0]; dragStart(t.clientX,t.clientY); },{passive:true});
  track.addEventListener('touchmove',(e)=>{
    if(!dragging) return;
    const t=e.touches[0]; dragMove(t.clientX,t.clientY);
    if(axis==='x' && e.cancelable) e.preventDefault();
  },{passive:false});
  track.addEventListener('touchend', dragEnd);
  track.addEventListener('touchcancel', dragEnd);
  track.addEventListener('mousedown',(e)=>{ if(e.button===0) dragStart(e.clientX,e.clientY); });
  window.addEventListener('mousemove',(e)=>{ if(dragging) dragMove(e.clientX,e.clientY); });
  window.addEventListener('mouseup', dragEnd);
}

/* ---------------- keyboard ---------------- */
window.addEventListener('keydown',(e)=>{
  if(e.key==='ArrowRight'){ hideHint(); next(); apReset(); }
  else if(e.key==='ArrowLeft'){ hideHint(); prev(); apReset(); }
  else if(e.key==='Escape'){ closeMenu(); }
  else if(e.key==='m'||e.key==='M'){ menu.classList.contains('open')?closeMenu():openMenu(); }
});

/* ---------------- hint ---------------- */
const hintEl=document.getElementById('hint');
let hintTimer=setTimeout(hideHint, 4200);
function hideHint(){ hintEl.classList.add('gone'); clearTimeout(hintTimer); }

/* ---------------- init ---------------- */
setTransform(false);
syncChrome();
window.addEventListener('resize', ()=>{ track.classList.add('dragging'); setTransform(false); requestAnimationFrame(()=>track.classList.remove('dragging')); });
</script>
