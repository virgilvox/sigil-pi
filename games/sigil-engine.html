<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=720, height=720, user-scalable=no">
  <title>Sigil Engine</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
    html, body { width: 720px; height: 720px; overflow: hidden; background: #0a0a0f; }
    canvas { display: block; cursor: grab; }
    canvas:active { cursor: grabbing; }
  </style>
</head>
<body>
<canvas id="c" width="720" height="720"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const W = 720, H = 720, CX = W/2, CY = H/2;

// Rune symbols - simple but mystical
const RUNES = ['◈', '◇', '△', '▽', '○', '☽', '✧', '⬡', '⬢', '✕', '∞', '◯'];

// Colors
const COLORS = {
  void: '#0a0808',
  voidInner: '#0f0c0c',
  ring: 'rgba(255, 240, 220, 0.06)',
  ringEdge: 'rgba(255, 240, 220, 0.15)',
  ringGrab: 'rgba(255, 200, 100, 0.2)',
  rune: 'rgba(255, 250, 240, 0.5)',
  runeActive: '#fff8e0',
  runeGlow: 'rgba(255, 220, 150, 0.8)',
  beam: 'rgba(255, 240, 200, 0.9)',
  beamGlow: 'rgba(255, 200, 100, 0.4)',
  target: 'rgba(255, 180, 100, 0.6)',
  success: 'rgba(255, 230, 150, 1)',
  combo: '#ffd700'
};

// Audio context for satisfying sounds
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playTone(freq, duration, type = 'sine', volume = 0.15) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playAlign() {
  playTone(440, 0.15, 'sine', 0.1);
  setTimeout(() => playTone(554, 0.1, 'sine', 0.08), 50);
}

function playCast() {
  playTone(220, 0.3, 'triangle', 0.15);
  playTone(440, 0.25, 'sine', 0.1);
  setTimeout(() => playTone(660, 0.2, 'sine', 0.12), 80);
  setTimeout(() => playTone(880, 0.3, 'sine', 0.08), 150);
}

function playFail() {
  playTone(150, 0.2, 'sawtooth', 0.08);
}

// Ring class
class Ring {
  constructor(radius, width, runeCount, speed = 0) {
    this.radius = radius;
    this.width = width;
    this.rotation = Math.random() * Math.PI * 2;
    this.targetRotation = this.rotation;
    this.velocity = 0;
    this.runeCount = runeCount;
    this.runes = [];
    this.grabbed = false;
    this.drift = speed; // Passive drift
    
    // Generate runes evenly spaced
    for (let i = 0; i < runeCount; i++) {
      this.runes.push({
        symbol: RUNES[Math.floor(Math.random() * RUNES.length)],
        angle: (i / runeCount) * Math.PI * 2,
        glow: 0,
        aligned: false
      });
    }
  }
  
  getWorldAngle(runeIndex) {
    return this.runes[runeIndex].angle + this.rotation;
  }
  
  update(dt) {
    if (!this.grabbed) {
      // Apply velocity with friction
      this.rotation += this.velocity;
      this.velocity *= 0.92;
      
      // Passive drift for higher levels
      this.rotation += this.drift * dt;
    }
    
    // Normalize rotation
    while (this.rotation > Math.PI * 2) this.rotation -= Math.PI * 2;
    while (this.rotation < 0) this.rotation += Math.PI * 2;
    
    // Update rune glows
    this.runes.forEach(r => {
      r.glow *= 0.9;
    });
  }
  
  draw(ctx, time) {
    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(this.rotation);
    
    // Ring body
    const gradient = ctx.createRadialGradient(0, 0, this.radius - this.width/2, 0, 0, this.radius + this.width/2);
    gradient.addColorStop(0, 'transparent');
    gradient.addColorStop(0.3, this.grabbed ? COLORS.ringGrab : COLORS.ring);
    gradient.addColorStop(0.7, this.grabbed ? COLORS.ringGrab : COLORS.ring);
    gradient.addColorStop(1, 'transparent');
    
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(0, 0, this.radius + this.width/2, 0, Math.PI * 2);
    ctx.arc(0, 0, this.radius - this.width/2, 0, Math.PI * 2, true);
    ctx.fill();
    
    // Ring edges
    ctx.strokeStyle = this.grabbed ? 'rgba(255, 200, 100, 0.3)' : COLORS.ringEdge;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 0, this.radius + this.width/2 - 2, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(0, 0, this.radius - this.width/2 + 2, 0, Math.PI * 2);
    ctx.stroke();
    
    // Runes
    this.runes.forEach((rune, i) => {
      const x = Math.cos(rune.angle) * this.radius;
      const y = Math.sin(rune.angle) * this.radius;
      
      // Glow effect
      if (rune.glow > 0.1 || rune.aligned) {
        const glowSize = 30 + rune.glow * 20;
        const glowGrad = ctx.createRadialGradient(x, y, 0, x, y, glowSize);
        glowGrad.addColorStop(0, `rgba(255, 220, 150, ${0.3 + rune.glow * 0.5})`);
        glowGrad.addColorStop(1, 'transparent');
        ctx.fillStyle = glowGrad;
        ctx.beginPath();
        ctx.arc(x, y, glowSize, 0, Math.PI * 2);
        ctx.fill();
      }
      
      // Rune symbol
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(-this.rotation); // Keep runes upright
      
      ctx.font = `${24 + rune.glow * 8}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = rune.aligned ? COLORS.runeActive : (rune.glow > 0.1 ? COLORS.runeGlow : COLORS.rune);
      ctx.fillText(rune.symbol, 0, 0);
      
      ctx.restore();
    });
    
    ctx.restore();
  }
  
  containsPoint(x, y) {
    const dx = x - CX;
    const dy = y - CY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    return dist > this.radius - this.width/2 - 15 && dist < this.radius + this.width/2 + 15;
  }
}

// Beam effect
class Beam {
  constructor(angle, rings) {
    this.angle = angle;
    this.life = 1;
    this.rings = rings; // How many rings it passed through
  }
  
  update(dt) {
    this.life -= dt * 2;
  }
  
  draw(ctx) {
    if (this.life <= 0) return;
    
    const alpha = this.life;
    const width = 4 + this.rings * 3;
    
    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(this.angle);
    
    // Beam glow
    const glowGrad = ctx.createLinearGradient(0, -width * 3, 0, width * 3);
    glowGrad.addColorStop(0, 'transparent');
    glowGrad.addColorStop(0.5, `rgba(255, 200, 100, ${alpha * 0.3})`);
    glowGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = glowGrad;
    ctx.fillRect(0, -width * 3, 350, width * 6);
    
    // Beam core
    const coreGrad = ctx.createLinearGradient(0, 0, 350, 0);
    coreGrad.addColorStop(0, `rgba(255, 255, 240, ${alpha})`);
    coreGrad.addColorStop(0.5, `rgba(255, 240, 200, ${alpha * 0.8})`);
    coreGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = coreGrad;
    ctx.fillRect(0, -width/2, 350, width);
    
    ctx.restore();
  }
}

// Particle system for extra juice
class Particle {
  constructor(x, y, angle, speed, color, size, life) {
    this.x = x;
    this.y = y;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.color = color;
    this.size = size;
    this.life = life;
    this.maxLife = life;
  }
  
  update(dt) {
    this.x += this.vx * dt * 60;
    this.y += this.vy * dt * 60;
    this.vx *= 0.98;
    this.vy *= 0.98;
    this.life -= dt;
  }
  
  draw(ctx) {
    const alpha = this.life / this.maxLife;
    ctx.fillStyle = this.color.replace('1)', `${alpha})`);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
}

// Constants for memory limits
const MAX_PARTICLES = 100;
const MAX_BEAMS = 10;

// Game state
let state = {
  rings: [],
  beams: [],
  particles: [],
  level: 1,
  score: 0,
  combo: 0,
  maxCombo: 0,
  targetRunes: [], // Which runes need to align
  targetAngle: 0,
  timeLeft: 30,
  phase: 'title', // title, playing, success, gameover
  castCooldown: 0,
  screenShake: 0,
  message: '',
  messageTimer: 0,
  pulsePhase: 0
};

// Pre-allocated gradient cache
const gradientCache = new Map();

function initLevel(level) {
  state.rings = [];
  state.beams = [];
  state.targetRunes = [];
  state.phase = 'playing';
  state.castCooldown = 0;
  
  // Ring count increases with level
  const ringCount = Math.min(2 + Math.floor(level / 2), 5);
  const baseRadius = 280;
  const ringSpacing = 55;
  
  // Drift speed increases with level
  const baseDrift = (level > 3) ? 0.1 + (level - 3) * 0.05 : 0;
  
  for (let i = 0; i < ringCount; i++) {
    const radius = baseRadius - i * ringSpacing;
    const runeCount = 6 + i; // Inner rings have more runes
    const drift = (i % 2 === 0 ? 1 : -1) * baseDrift * (i + 1) * 0.3;
    state.rings.push(new Ring(radius, 45, runeCount, drift));
  }
  
  // Generate target pattern
  generateTarget();
  
  // Time based on complexity
  state.timeLeft = 20 + level * 5;
  
  showMessage(`LEVEL ${level}`);
}

function generateTarget() {
  // Pick a random angle for alignment
  state.targetAngle = Math.random() * Math.PI * 2;
  state.targetRunes = [];
  
  // Pick one rune from each ring that needs to align
  state.rings.forEach((ring, i) => {
    const runeIndex = Math.floor(Math.random() * ring.runes.length);
    state.targetRunes.push({
      ring: i,
      rune: runeIndex,
      symbol: ring.runes[runeIndex].symbol
    });
  });
}

function showMessage(msg) {
  state.message = msg;
  state.messageTimer = 90;
}

function spawnParticles(x, y, count, color) {
  // Limit total particles
  const available = MAX_PARTICLES - state.particles.length;
  const toSpawn = Math.min(count, available);
  for (let i = 0; i < toSpawn; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    const size = 2 + Math.random() * 4;
    state.particles.push(new Particle(x, y, angle, speed, color, size, 0.5 + Math.random() * 0.5));
  }
}

function checkAlignment() {
  const tolerance = 0.15; // Radians - how close is "aligned"
  let allAligned = true;
  let alignedCount = 0;
  
  state.targetRunes.forEach(target => {
    const ring = state.rings[target.ring];
    const rune = ring.runes[target.rune];
    const worldAngle = ring.getWorldAngle(target.rune);
    
    // Normalize angles for comparison
    let diff = worldAngle - state.targetAngle;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    
    if (Math.abs(diff) < tolerance) {
      rune.aligned = true;
      rune.glow = Math.max(rune.glow, 0.8);
      alignedCount++;
    } else {
      rune.aligned = false;
      allAligned = false;
    }
  });
  
  return { allAligned, alignedCount };
}

function cast() {
  if (state.castCooldown > 0) return;
  
  const result = checkAlignment();
  
  if (result.allAligned) {
    // SUCCESS!
    state.combo++;
    state.maxCombo = Math.max(state.maxCombo, state.combo);
    
    const basePoints = 100 * state.rings.length;
    const comboBonus = state.combo > 1 ? state.combo * 50 : 0;
    const timeBonus = Math.floor(state.timeLeft * 2);
    state.score += basePoints + comboBonus + timeBonus;
    
    // Epic feedback
    state.screenShake = 15;
    playCast();
    
    // Beam effect
    state.beams.push(new Beam(state.targetAngle, state.rings.length));
    
    // Particles at center
    spawnParticles(CX, CY, 30 + state.combo * 10, 'rgba(255, 230, 150, 1)');
    
    // Particles along the beam
    for (let i = 0; i < state.rings.length; i++) {
      const r = state.rings[i].radius;
      const x = CX + Math.cos(state.targetAngle) * r;
      const y = CY + Math.sin(state.targetAngle) * r;
      spawnParticles(x, y, 15, 'rgba(255, 200, 100, 1)');
    }
    
    showMessage(state.combo > 1 ? `×${state.combo} CHAIN!` : 'CAST!');
    
    // Generate new target
    setTimeout(() => {
      if (state.phase === 'playing') generateTarget();
    }, 400);
    
    state.castCooldown = 0.5;
    
  } else if (result.alignedCount > 0) {
    // Partial - some aligned
    playAlign();
    showMessage(`${result.alignedCount}/${state.rings.length}`);
    state.castCooldown = 0.2;
  } else {
    // Miss
    state.combo = 0;
    playFail();
    state.screenShake = 5;
    showMessage('MISALIGNED');
    state.castCooldown = 0.3;
  }
}

// Input handling
let dragRing = null;
let lastAngle = 0;

function getAngle(x, y) {
  return Math.atan2(y - CY, x - CX);
}

function handlePointerDown(e) {
  initAudio();
  
  const rect = c.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  
  if (state.phase === 'title') {
    initLevel(1);
    return;
  }
  
  if (state.phase === 'gameover') {
    state.phase = 'title';
    state.score = 0;
    state.combo = 0;
    state.maxCombo = 0;
    state.level = 1;
    return;
  }
  
  if (state.phase !== 'playing') return;
  
  // Check if clicking center to cast
  const distFromCenter = Math.sqrt((x - CX) ** 2 + (y - CY) ** 2);
  if (distFromCenter < 60) {
    cast();
    return;
  }
  
  // Find which ring was grabbed (check from outside in)
  for (let i = 0; i < state.rings.length; i++) {
    if (state.rings[i].containsPoint(x, y)) {
      dragRing = state.rings[i];
      dragRing.grabbed = true;
      lastAngle = getAngle(x, y);
      break;
    }
  }
}

function handlePointerMove(e) {
  if (!dragRing) return;
  
  const rect = c.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  
  const newAngle = getAngle(x, y);
  let delta = newAngle - lastAngle;
  
  // Handle wraparound
  if (delta > Math.PI) delta -= Math.PI * 2;
  if (delta < -Math.PI) delta += Math.PI * 2;
  
  dragRing.rotation += delta;
  dragRing.velocity = delta * 0.5; // For momentum
  lastAngle = newAngle;
  
  // Check alignment while dragging
  checkAlignment();
}

function handlePointerUp() {
  if (dragRing) {
    dragRing.grabbed = false;
    dragRing = null;
  }
}

c.addEventListener('pointerdown', handlePointerDown);
c.addEventListener('pointermove', handlePointerMove);
c.addEventListener('pointerup', handlePointerUp);
c.addEventListener('pointerleave', handlePointerUp);

// Spacebar to cast
document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (state.phase === 'playing') cast();
    else if (state.phase === 'title') initLevel(1);
    else if (state.phase === 'gameover') {
      state.phase = 'title';
      state.score = 0;
    }
  }
});

function drawBackground() {
  // Void gradient
  const bg = ctx.createRadialGradient(CX, CY, 0, CX, CY, 360);
  bg.addColorStop(0, '#151010');
  bg.addColorStop(0.5, '#0c0808');
  bg.addColorStop(1, '#050404');
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.arc(CX, CY, 360, 0, Math.PI * 2);
  ctx.fill();
}

function drawTargetIndicator(time) {
  if (state.phase !== 'playing') return;
  
  const pulse = Math.sin(time * 3) * 0.3 + 0.7;
  
  // Draw target line
  ctx.save();
  ctx.translate(CX, CY);
  ctx.rotate(state.targetAngle);
  
  // Outer indicator
  ctx.strokeStyle = `rgba(255, 180, 100, ${0.3 * pulse})`;
  ctx.lineWidth = 2;
  ctx.setLineDash([10, 10]);
  ctx.beginPath();
  ctx.moveTo(50, 0);
  ctx.lineTo(340, 0);
  ctx.stroke();
  ctx.setLineDash([]);
  
  // Target rune indicators on each ring
  state.targetRunes.forEach(target => {
    const ring = state.rings[target.ring];
    const x = ring.radius;
    
    ctx.fillStyle = `rgba(255, 200, 100, ${0.4 * pulse})`;
    ctx.font = '18px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(target.symbol, x, 0);
  });
  
  ctx.restore();
}

function drawCenter(time) {
  const pulse = Math.sin(time * 2) * 0.2 + 0.8;
  
  // Center glow
  const centerGrad = ctx.createRadialGradient(CX, CY, 0, CX, CY, 60);
  centerGrad.addColorStop(0, `rgba(255, 220, 150, ${0.15 * pulse})`);
  centerGrad.addColorStop(0.5, `rgba(255, 180, 100, ${0.08 * pulse})`);
  centerGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = centerGrad;
  ctx.beginPath();
  ctx.arc(CX, CY, 60, 0, Math.PI * 2);
  ctx.fill();
  
  // Center ring
  ctx.strokeStyle = `rgba(255, 200, 100, ${0.3 * pulse})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(CX, CY, 45, 0, Math.PI * 2);
  ctx.stroke();
  
  // Cast symbol
  if (state.phase === 'playing') {
    ctx.fillStyle = `rgba(255, 230, 180, ${0.5 + pulse * 0.3})`;
    ctx.font = '28px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('✧', CX, CY);
  }
}

function drawUI(time) {
  // Score
  ctx.fillStyle = 'rgba(255, 250, 240, 0.7)';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(state.score.toString().padStart(7, '0'), CX, 45);
  
  // Timer bar
  if (state.phase === 'playing') {
    const barWidth = 200;
    const barHeight = 4;
    const barX = CX - barWidth/2;
    const barY = 60;
    const fill = state.timeLeft / (20 + state.level * 5);
    
    ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
    ctx.fillRect(barX, barY, barWidth, barHeight);
    
    const timerColor = fill > 0.3 ? 'rgba(255, 220, 150, 0.8)' : 'rgba(255, 100, 100, 0.8)';
    ctx.fillStyle = timerColor;
    ctx.fillRect(barX, barY, barWidth * fill, barHeight);
  }
  
  // Combo
  if (state.combo > 1) {
    ctx.fillStyle = COLORS.combo;
    ctx.font = 'bold 24px monospace';
    ctx.fillText(`×${state.combo}`, CX, H - 55);
  }
  
  // Level
  ctx.fillStyle = 'rgba(255, 250, 240, 0.4)';
  ctx.font = '14px monospace';
  ctx.fillText(`SIGIL ${state.level}`, CX, H - 30);
  
  // Message
  if (state.messageTimer > 0) {
    const alpha = Math.min(1, state.messageTimer / 30);
    ctx.fillStyle = `rgba(255, 240, 200, ${alpha})`;
    ctx.font = 'bold 26px monospace';
    ctx.fillText(state.message, CX, CY + 120);
  }
}

function drawTitle(time) {
  const pulse = Math.sin(time * 2) * 0.2 + 0.8;
  
  ctx.fillStyle = `rgba(255, 240, 200, ${pulse})`;
  ctx.font = 'bold 42px serif';
  ctx.textAlign = 'center';
  ctx.fillText('SIGIL ENGINE', CX, CY - 40);
  
  ctx.fillStyle = 'rgba(255, 240, 200, 0.5)';
  ctx.font = '16px monospace';
  ctx.fillText('SPIN THE RINGS', CX, CY + 20);
  ctx.fillText('ALIGN THE RUNES', CX, CY + 45);
  ctx.fillText('TAP CENTER TO CAST', CX, CY + 70);
  
  ctx.fillStyle = `rgba(255, 200, 100, ${pulse})`;
  ctx.font = '18px monospace';
  ctx.fillText('[ TAP TO BEGIN ]', CX, CY + 130);
}

function drawGameOver(time) {
  const pulse = Math.sin(time * 2) * 0.2 + 0.8;
  
  ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
  ctx.beginPath();
  ctx.arc(CX, CY, 360, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.fillStyle = `rgba(255, 200, 150, ${pulse})`;
  ctx.font = 'bold 36px serif';
  ctx.textAlign = 'center';
  ctx.fillText('TIME EXPIRED', CX, CY - 50);
  
  ctx.fillStyle = 'rgba(255, 240, 200, 0.9)';
  ctx.font = 'bold 28px monospace';
  ctx.fillText(state.score.toString(), CX, CY + 10);
  
  ctx.fillStyle = 'rgba(255, 240, 200, 0.5)';
  ctx.font = '16px monospace';
  ctx.fillText(`MAX CHAIN: ${state.maxCombo}`, CX, CY + 50);
  ctx.fillText(`REACHED SIGIL ${state.level}`, CX, CY + 75);
  
  ctx.fillStyle = `rgba(255, 200, 100, ${pulse})`;
  ctx.font = '18px monospace';
  ctx.fillText('[ TAP TO CONTINUE ]', CX, CY + 130);
}

let lastTime = 0;

function update(dt) {
  state.pulsePhase += dt;
  
  if (state.messageTimer > 0) state.messageTimer -= dt * 60;
  if (state.castCooldown > 0) state.castCooldown -= dt;
  if (state.screenShake > 0) state.screenShake *= 0.9;
  
  // Update rings
  state.rings.forEach(ring => ring.update(dt));
  
  // Update beams (in-place removal to avoid garbage)
  for (let i = state.beams.length - 1; i >= 0; i--) {
    state.beams[i].update(dt);
    if (state.beams[i].life <= 0) {
      state.beams.splice(i, 1);
    }
  }
  // Cap beams
  if (state.beams.length > MAX_BEAMS) {
    state.beams.length = MAX_BEAMS;
  }

  // Update particles (in-place removal to avoid garbage)
  for (let i = state.particles.length - 1; i >= 0; i--) {
    state.particles[i].update(dt);
    if (state.particles[i].life <= 0) {
      state.particles.splice(i, 1);
    }
  }
  
  // Timer
  if (state.phase === 'playing') {
    state.timeLeft -= dt;
    if (state.timeLeft <= 0) {
      state.phase = 'gameover';
    }
    
    // Level up after enough casts (tracked by score thresholds)
    const levelThreshold = state.level * 500;
    if (state.score >= levelThreshold && state.combo > 0) {
      state.level++;
      initLevel(state.level);
    }
  }
}

function draw(time) {
  const t = time / 1000;
  
  ctx.save();
  
  // Screen shake
  if (state.screenShake > 0.5) {
    const shake = state.screenShake;
    ctx.translate(
      (Math.random() - 0.5) * shake,
      (Math.random() - 0.5) * shake
    );
  }
  
  // Clip to circle
  ctx.beginPath();
  ctx.arc(CX, CY, 360, 0, Math.PI * 2);
  ctx.clip();
  
  drawBackground();
  
  if (state.phase === 'title') {
    // Draw decorative rings on title
    for (let i = 0; i < 3; i++) {
      ctx.strokeStyle = `rgba(255, 200, 150, ${0.1 - i * 0.03})`;
      ctx.lineWidth = 40;
      ctx.beginPath();
      ctx.arc(CX, CY, 280 - i * 55, 0, Math.PI * 2);
      ctx.stroke();
    }
    drawTitle(t);
  } else {
    // Game elements
    drawTargetIndicator(t);
    
    // Draw rings (outer first)
    state.rings.forEach(ring => ring.draw(ctx, t));
    
    // Draw beams
    state.beams.forEach(beam => beam.draw(ctx));
    
    // Draw particles
    state.particles.forEach(p => p.draw(ctx));
    
    drawCenter(t);
    drawUI(t);
    
    if (state.phase === 'gameover') {
      drawGameOver(t);
    }
  }
  
  ctx.restore();
  
  // Outer boundary
  ctx.strokeStyle = 'rgba(255, 220, 150, 0.15)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(CX, CY, 358, 0, Math.PI * 2);
  ctx.stroke();
}

function loop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.1);
  lastTime = time;
  
  update(dt);
  draw(time);
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
