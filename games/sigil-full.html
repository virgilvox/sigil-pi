function dist(x1, y1, x2, y2) { return Math.sqrt((x2-x1)**2 + (y2-y1)**2); }
function ang(x, y) { return Math.atan2(y - CENTER, x - CENTER); }
function normAng(a) { while(a < 0) a += Math.PI*2; while(a >= Math.PI*2) a -= Math.PI*2; return a; }
function angDiff(a1, a2) { let d = normAng(a2-a1); if(d > Math.PI) d -= Math.PI*2; return d; }
function lerp(a, b, t) { return a + (b - a) * t; }
function inZone(x, y, pid) { return Math.abs(angDiff(ang(x,y), state.players[pid].angle)) < Math.PI/2; }

function getPlayer(x, y) {
    const d = dist(x, y, CENTER, CENTER);
    if (d < R.inner || d > R.outer) return -1;
    return inZone(x, y, 0) ? 0 : 1;
}

function getSpellBtns(pid) {
    const p = state.players[pid];
    const btns = [];
    const spread = Math.PI * 0.55;
    SPELLS.forEach((spell, i) => {
        const a = p.angle - spread/2 + (i + 0.5) / SPELLS.length * spread;
        btns.push({ x: CENTER + Math.cos(a) * R.spell, y: CENTER + Math.sin(a) * R.spell, a, spell, r: 26 });
    });
    return btns;
}

function getBtnAt(x, y, pid) {
    for (const b of getSpellBtns(pid)) {
        if (dist(x, y, b.x, b.y) < b.r + 8) return b;
    }
    return null;
}

function inRing(x, y) {
    const d = dist(x, y, CENTER, CENTER);
    return d > R.ring - R.ringW && d < R.ring + R.ringW;
}

// Generate random barriers for a player
function generateBarriers(pid) {
    const p = state.players[pid];
    const barriers = [];
    const numBarriers = 3 + Math.floor(Math.random() * 2); // 3-4 barriers
    const usedAngles = [];
    
    for (let i = 0; i < numBarriers; i++) {
        // Random angle within player's zone (but not too close to center or edges)
        let ang;
        let attempts = 0;
        do {
            ang = p.angle + (Math.random() - 0.5) * Math.PI * 0.7;
            attempts++;
        } while (usedAngles.some(a => Math.abs(angDiff(a, ang)) < 0.25) && attempts < 20);
        
        usedAngles.push(ang);
        
        // Random radius between cast zone and life ring
        const radius = R.cast + 20 + Math.random() * (R.life - R.cast - 50);
        
        // Random size (arc length)
        const size = 0.15 + Math.random() * 0.15; // Arc span in radians
        
        barriers.push({
            ang: ang,
            radius: radius,
            size: size,
            hp: 2, // Takes 2 hits to destroy
            maxHp: 2,
            flash: 0,
            seed: Math.random() // For visual variation
        });
    }
    
    return barriers;
}

// ═══════════════════════════════════════════════════════════════════
// BACKGROUND
// ═══════════════════════════════════════════════════════════════════
function genBackground() {
    state.runes = [];
    const numRunes = PERF_MODE ? MAX_RUNES : 50;
    for (let i = 0; i < numRunes; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = R.inner + 20 + Math.random() * (R.outer - R.inner - 40);
        state.runes.push({
            x: CENTER + Math.cos(a) * r, y: CENTER + Math.sin(a) * r,
            seed: Math.random(), size: 10 + Math.random() * 14,
            alpha: 0.02 + Math.random() * 0.04, phase: Math.random() * Math.PI * 2
        });
    }
    drawBackground();
}

function drawBackground() {
    const c = bgCtx;
    
    // Deep gradient
    const bg = c.createRadialGradient(CENTER, CENTER, 0, CENTER, CENTER, R.outer);
    bg.addColorStop(0, '#0a0a10');
    bg.addColorStop(0.6, '#06060a');
    bg.addColorStop(1, '#030306');
    c.fillStyle = bg;
    c.fillRect(0, 0, SIZE, SIZE);
    
    c.save();
    c.beginPath();
    c.arc(CENTER, CENTER, R.outer, 0, Math.PI * 2);
    c.clip();
    
    // Subtle concentric circles
    c.strokeStyle = 'rgba(100, 90, 130, 0.04)';
    c.lineWidth = 1;
    for (let r = 50; r < R.outer; r += 30) {
        c.beginPath();
        c.arc(CENTER, CENTER, r, 0, Math.PI * 2);
        c.stroke();
    }
    
    // Main structure circles
    c.strokeStyle = 'rgba(100, 90, 130, 0.08)';
    [R.eye, R.inner, R.ring, R.cast, R.life].forEach(r => {
        c.beginPath();
        c.arc(CENTER, CENTER, r, 0, Math.PI * 2);
        c.stroke();
    });
    
    // 12 radial lines
    c.strokeStyle = 'rgba(100, 90, 130, 0.05)';
    for (let i = 0; i < 12; i++) {
        const a = i * Math.PI / 6;
        c.beginPath();
        c.moveTo(CENTER + Math.cos(a) * R.eye, CENTER + Math.sin(a) * R.eye);
        c.lineTo(CENTER + Math.cos(a) * R.outer, CENTER + Math.sin(a) * R.outer);
        c.stroke();
    }
    
    // Player zone washes
    c.globalAlpha = 0.04;
    const g1 = c.createRadialGradient(CENTER, CENTER - 180, 0, CENTER, CENTER - 180, 300);
    g1.addColorStop(0, COL.p1.pri);
    g1.addColorStop(1, 'transparent');
    c.fillStyle = g1;
    c.beginPath();
    c.arc(CENTER, CENTER, R.outer, Math.PI, Math.PI * 2);
    c.lineTo(CENTER, CENTER);
    c.fill();
    
    const g2 = c.createRadialGradient(CENTER, CENTER + 180, 0, CENTER, CENTER + 180, 300);
    g2.addColorStop(0, COL.p2.pri);
    g2.addColorStop(1, 'transparent');
    c.fillStyle = g2;
    c.beginPath();
    c.arc(CENTER, CENTER, R.outer, 0, Math.PI);
    c.lineTo(CENTER, CENTER);
    c.fill();
    
    c.globalAlpha = 1;
    c.restore();
    
    // Border
    c.strokeStyle = '#151518';
    c.lineWidth = 3;
    c.beginPath();
    c.arc(CENTER, CENTER, R.outer, 0, Math.PI * 2);
    c.stroke();
}

// ═══════════════════════════════════════════════════════════════════
// SPELLS
// ═══════════════════════════════════════════════════════════════════
function cast(pid, spellId, aimAng, sx, sy, endX, endY, dragDist) {
    const p = state.players[pid];
    const opp = state.players[1-pid];
    const spell = SPELLS.find(s => s.id === spellId);
    const col = pid === 0 ? COL.p1 : COL.p2;
    
    if (p.energy < spell.cost) {
        for (let i = 0; i < 6; i++) {
            const a = Math.random() * Math.PI * 2;
            state.particles.push({ x: sx, y: sy, vx: Math.cos(a)*2, vy: Math.sin(a)*2, life: 0.3, col: '#333', size: 2 });
        }
        playSound('no_energy', { pan: getPan(sx) });
        return false;
    }
    
    p.energy -= spell.cost;
    
    // Cast effect
    state.effects.push({ x: sx, y: sy, type: 'cast', col: col.pri, life: 1 });
    for (let i = 0; i < 20; i++) {
        const a = aimAng + (Math.random() - 0.5) * 0.6;
        const v = 2 + Math.random() * 4;
        state.particles.push({ x: sx, y: sy, vx: Math.cos(a)*v, vy: Math.sin(a)*v, life: 0.4, col: col.pri, size: 2 + Math.random()*2 });
    }
    
    switch(spell.type) {
        case 'projectile':
            state.projectiles.push({
                x: sx, y: sy, ang: aimAng, speed: spell.speed, dmg: spell.damage,
                pid, heavy: spellId === 'lance', trail: [], life: 1
            });
            playSound(spellId === 'lance' ? 'lance' : 'bolt', { pan: getPan(sx) });
            break;
            
        case 'ward':
            // Create a defensive barrier WHERE you aim within your zone
            // The barrier appears at the angle you drag toward
            let wardAng = aimAng;
            
            // Clamp angle to player's zone
            const maxDeviation = Math.PI * 0.45;
            const deviation = angDiff(p.angle, wardAng);
            if (Math.abs(deviation) > maxDeviation) {
                wardAng = p.angle + Math.sign(deviation) * maxDeviation;
            }
            
            // Radius based on where you're pointing
            // Calculate where the aim ray intersects the valid barrier zone
            const minR = R.cast + 15;
            const maxR = R.life - 20;
            
            // Use the endpoint distance from center as basis
            const endDistFromCenter = dist(endX, endY, CENTER, CENTER);
            let wardRadius;
            
            if (endDistFromCenter < minR) {
                wardRadius = minR + Math.random() * 20;
            } else if (endDistFromCenter > maxR) {
                wardRadius = maxR - Math.random() * 20;
            } else {
                // Place at roughly where the drag ended (in the valid zone)
                wardRadius = endDistFromCenter + (Math.random() - 0.5) * 15;
            }
            wardRadius = Math.max(minR, Math.min(maxR, wardRadius));
            
            // Add as permanent barrier
            p.barriers.push({
                ang: wardAng,
                radius: wardRadius,
                size: 0.16 + Math.random() * 0.06,
                hp: 2,
                maxHp: 2,
                flash: 1,
                seed: Math.random()
            });
            
            // Creation effect at actual barrier location
            const wx = CENTER + Math.cos(wardAng) * wardRadius;
            const wy = CENTER + Math.sin(wardAng) * wardRadius;
            state.effects.push({ x: wx, y: wy, type: 'ward', col: col.sec, life: 1 });
            playSound('ward', { pan: getPan(wx) });
            
            // Particles forming the barrier
            for (let i = 0; i < 25; i++) {
                const pa = wardAng + (Math.random() - 0.5) * 0.4;
                const pr = wardRadius + (Math.random() - 0.5) * 20;
                const px = CENTER + Math.cos(pa) * pr;
                const py = CENTER + Math.sin(pa) * pr;
                state.particles.push({ 
                    x: px, y: py, 
                    vx: (Math.random() - 0.5) * 2, 
                    vy: (Math.random() - 0.5) * 2, 
                    life: 0.5 + Math.random() * 0.3, 
                    col: col.sec, 
                    size: 3 + Math.random() * 3 
                });
            }
            break;
            
        case 'beam':
            // Instant beam attack - check for hit first
            let hitX = null, hitY = null, didHit = false;
            let hitBarrier = false;
            const beamEndX = sx + Math.cos(aimAng) * 400;
            const beamEndY = sy + Math.sin(aimAng) * 400;
            
            // Sample along beam to find hit point
            for (let t = 0; t < 1 && !hitBarrier; t += 0.02) {
                const bx = lerp(sx, beamEndX, t);
                const by = lerp(sy, beamEndY, t);
                const bd = dist(bx, by, CENTER, CENTER);
                const ba = ang(bx, by);
                
                // Check barrier collision first
                state.players.forEach((pl, idx) => {
                    pl.barriers.forEach(bar => {
                        if (bar.hp <= 0 || hitBarrier) return;
                        const barDist = Math.abs(bd - bar.radius);
                        const barAngDiff = Math.abs(angDiff(ba, bar.ang));
                        
                        if (barDist < 15 && barAngDiff < bar.size + 0.03) {
                            hitBarrier = true;
                            hitX = bx;
                            hitY = by;
                            // Beam blocked by barrier - damage it
                            bar.hp--;
                            bar.flash = 1;
                            const barCol = idx === 0 ? COL.p1 : COL.p2;
                            
                            if (bar.hp <= 0) {
                                playSound('barrier_break', { pan: getPan(bx) });
                                for (let i = 0; i < 25; i++) {
                                    const a = Math.random() * Math.PI * 2;
                                    state.particles.push({ x: bx, y: by, vx: Math.cos(a)*5, vy: Math.sin(a)*5, life: 0.5, col: barCol.pri, size: 3 });
                                }
                            } else {
                                playSound('barrier_hit', { pan: getPan(bx) });
                                for (let i = 0; i < 12; i++) {
                                    const a = Math.random() * Math.PI * 2;
                                    state.particles.push({ x: bx, y: by, vx: Math.cos(a)*3, vy: Math.sin(a)*3, life: 0.3, col: barCol.sec, size: 2 });
                                }
                            }
                        }
                    });
                });
                
                if (!hitBarrier && bd > R.cast && bd < R.life + 20 && inZone(bx, by, 1-pid)) {
                    hitX = bx;
                    hitY = by;
                    didHit = true;
                    // Steal energy
                    const stolen = Math.min(spell.steal, opp.energy);
                    opp.energy -= stolen;
                    p.energy = Math.min(p.maxEnergy, p.energy + stolen);
                    p.eFlash = 1;
                    break;
                }
            }
            
            // Create outgoing beam
            state.beams.push({
                sx, sy, ang: aimAng, pid, life: 0.3,
                length: hitX ? dist(sx, sy, hitX, hitY) : R.outer,
                type: 'attack'
            });
            playSound('siphon', { pan: getPan(sx) });
            
            // If hit player (not barrier), create drain beam coming back
            if (didHit && hitX && !hitBarrier) {
                state.beams.push({
                    sx: hitX, sy: hitY,
                    ex: sx, ey: sy,
                    pid, life: 1.2,
                    type: 'drain',
                    fromCol: 1 - pid, // Color of victim
                    toCol: pid // Color of stealer
                });
                
                playSound('drain', { pan: getPan(hitX) });
                
                // Particles at hit point
                for (let i = 0; i < 20; i++) {
                    const a = Math.random() * Math.PI * 2;
                    state.particles.push({ x: hitX, y: hitY, vx: Math.cos(a)*3, vy: Math.sin(a)*3, life: 0.4, col: COL.energy, size: 3 });
                }
                
                // Particles flowing back to caster
                const oppCol = (1 - pid) === 0 ? COL.p1 : COL.p2;
                for (let i = 0; i < 12; i++) {
                    const delay = i * 0.05;
                    setTimeout(() => {
                        const dx = sx - hitX, dy = sy - hitY;
                        const d = Math.sqrt(dx*dx + dy*dy);
                        state.particles.push({
                            x: hitX + (Math.random() - 0.5) * 10,
                            y: hitY + (Math.random() - 0.5) * 10,
                            vx: (dx / d) * 8,
                            vy: (dy / d) * 8,
                            life: 0.6,
                            col: i < 4 ? oppCol.pri : (i < 8 ? COL.energy : col.pri),
                            size: 4 + Math.random() * 3
                        });
                    }, delay * 1000);
                }
                
                // Burst effect at caster when energy arrives
                setTimeout(() => {
                    for (let i = 0; i < 15; i++) {
                        const a = Math.random() * Math.PI * 2;
                        state.particles.push({
                            x: sx + (Math.random() - 0.5) * 10,
                            y: sy + (Math.random() - 0.5) * 10,
                            vx: Math.cos(a) * 4,
                            vy: Math.sin(a) * 4,
                            life: 0.5,
                            col: col.sec,
                            size: 4 + Math.random() * 3
                        });
                    }
                    state.effects.push({ x: sx, y: sy, type: 'absorb', col: col.pri, life: 1 });
                }, 400);
            }
            break;
    }
    
    return true;
}

// ═══════════════════════════════════════════════════════════════════
// ORB COLLECTION WITH CHAINS
// ═══════════════════════════════════════════════════════════════════
function collectOrbs(x, y, pid) {
    const p = state.players[pid];
    const col = pid === 0 ? COL.p1 : COL.p2;
    
    const toCollect = [];
    const checked = new Set();
    
    function chain(orb) {
        if (checked.has(orb) || orb.dead) return;
        if (!inZone(orb.x, orb.y, pid)) return;
        checked.add(orb);
        toCollect.push(orb);
        state.orbs.forEach(o => {
            if (!checked.has(o) && !o.dead && dist(orb.x, orb.y, o.x, o.y) < 100) chain(o);
        });
    }
    
    state.orbs.forEach(o => {
        if (!o.dead && dist(x, y, o.x, o.y) < 40) chain(o);
    });
    
    let got = 0;
    toCollect.forEach((o, i) => {
        if (p.energy < p.maxEnergy) {
            o.dead = true;
            p.energy++;
            got++;
            const orbCol = o.color;
            const pitch = 0.8 + Math.random() * 0.4;
            setTimeout(() => {
                playSound('collect', { pan: getPan(o.x), pitch: pitch + i * 0.1 });
                for (let j = 0; j < 15; j++) {
                    const a = Math.random() * Math.PI * 2;
                    state.particles.push({ x: o.x, y: o.y, vx: Math.cos(a)*3, vy: Math.sin(a)*3, life: 0.4, col: orbCol.mid, size: 3 });
                }
                if (i < toCollect.length - 1) {
                    const next = toCollect[i+1];
                    for (let j = 0; j < 4; j++) {
                        const t = j / 4;
                        state.particles.push({ x: lerp(o.x, next.x, t), y: lerp(o.y, next.y, t), vx: 0, vy: 0, life: 0.25, col: orbCol.outer, size: 2 });
                    }
                }
            }, i * 40);
        }
    });
    
    if (got > 1) {
        setTimeout(() => playSound('chain'), got * 40);
    }
    
    if (got > 0) p.eFlash = 1;
}

// ═══════════════════════════════════════════════════════════════════
// INPUT - Multi-touch support for two players
// ═══════════════════════════════════════════════════════════════════
function getCoords(e) {
    const rect = mainCanvas.getBoundingClientRect();
    const cx = e.clientX ?? 0;
    const cy = e.clientY ?? 0;
    return { x: (cx - rect.left) / rect.width * SIZE, y: (cy - rect.top) / rect.height * SIZE };
}

function onStart(pointerId, x, y) {
    if (!state.running) return;

    if (inRing(x, y)) {
        state.pointers.set(pointerId, { type: 'ring', startAng: state.ring.angle, touchAng: ang(x, y) });
        return;
    }

    const pid = getPlayer(x, y);
    if (pid >= 0) {
        const btn = getBtnAt(x, y, pid);
        if (btn) {
            state.pointers.set(pointerId, { type: 'spell', pid, spell: btn.spell, sx: btn.x, sy: btn.y, x, y });
        } else {
            collectOrbs(x, y, pid);
            state.pointers.set(pointerId, { type: 'collect', pid });
        }
    }
}

function onMove(pointerId, x, y) {
    if (!state.running) return;
    const ptr = state.pointers.get(pointerId);
    if (!ptr) return;

    if (ptr.type === 'ring') {
        state.ring.target = ptr.startAng + (ang(x, y) - ptr.touchAng);
    } else if (ptr.type === 'spell') {
        ptr.x = x; ptr.y = y;
    } else if (ptr.type === 'collect') {
        collectOrbs(x, y, ptr.pid);
    }
}

function onEnd(pointerId, x, y) {
    if (!state.running) return;
    const ptr = state.pointers.get(pointerId);
    if (!ptr) return;

    if (ptr.type === 'spell') {
        const dx = x - ptr.sx, dy = y - ptr.sy;
        const dragDist = Math.sqrt(dx*dx + dy*dy);
        if (dragDist > 25) {
            cast(ptr.pid, ptr.spell.id, Math.atan2(dy, dx), ptr.sx, ptr.sy, x, y, dragDist);
        }
    }

    state.pointers.delete(pointerId);
}

// Pointer events support multi-touch via pointerId
mainCanvas.addEventListener('pointerdown', e => {
    e.preventDefault();
    mainCanvas.setPointerCapture(e.pointerId);
    const {x,y} = getCoords(e);
    onStart(e.pointerId, x, y);
});
mainCanvas.addEventListener('pointermove', e => {
    e.preventDefault();
    const {x,y} = getCoords(e);
    onMove(e.pointerId, x, y);
});
mainCanvas.addEventListener('pointerup', e => {
    e.preventDefault();
    const {x,y} = getCoords(e);
    onEnd(e.pointerId, x, y);
});
mainCanvas.addEventListener('pointercancel', e => {
    state.pointers.delete(e.pointerId);
});
mainCanvas.addEventListener('contextmenu', e => e.preventDefault());

function spawnOrb() {
    const a = Math.random() * Math.PI * 2;
    
    // Varying orb colors - magical/ethereal palette
    const orbColors = [
        { core: '#e8e4d8', mid: '#d4c8f0', outer: '#9a8ac8', glow: 'rgba(212, 200, 240, 0.6)' }, // Lavender
        { core: '#ffe8d8', mid: '#ffb890', outer: '#d87850', glow: 'rgba(255, 184, 144, 0.6)' }, // Amber
        { core: '#d8ffe8', mid: '#90ffb8', outer: '#50d878', glow: 'rgba(144, 255, 184, 0.6)' }, // Mint
        { core: '#d8f0ff', mid: '#90d0ff', outer: '#5090d8', glow: 'rgba(144, 208, 255, 0.6)' }, // Azure
        { core: '#ffd8f0', mid: '#ff90c0', outer: '#d85090', glow: 'rgba(255, 144, 192, 0.6)' }, // Rose
        { core: '#fff8d8', mid: '#ffe870', outer: '#d8b030', glow: 'rgba(255, 232, 112, 0.6)' }, // Gold
        { core: '#f0d8ff', mid: '#c890ff', outer: '#9050d8', glow: 'rgba(200, 144, 255, 0.6)' }, // Violet
        { core: '#d8fff8', mid: '#70ffe8', outer: '#30d8c0', glow: 'rgba(112, 255, 232, 0.6)' }  // Cyan
    ];
    const color = orbColors[Math.floor(Math.random() * orbColors.length)];
    
    state.orbs.push({ 
        x: CENTER + Math.cos(a) * R.eye, 
        y: CENTER + Math.sin(a) * R.eye, 
        a, r: R.eye, 
        speed: 28 + Math.random() * 18, 
        life: 1, 
        dead: false, 
        phase: Math.random() * Math.PI * 2,
        color: color
    });
}

function update(dt) {
    state.time += dt;
    
    // Orbs (in-place removal)
    for (let i = state.orbs.length - 1; i >= 0; i--) {
        const o = state.orbs[i];
        if (o.dead || o.life <= 0 || o.r >= R.life) {
            state.orbs.splice(i, 1);
            continue;
        }
        o.r += o.speed * dt;
        o.x = CENTER + Math.cos(o.a) * o.r;
        o.y = CENTER + Math.sin(o.a) * o.r;
        if (o.r > R.cast) o.life -= dt * 1.5;
    }
    
    // Arc connections between orbs
    state.arcs = [];
    for (let i = 0; i < state.orbs.length; i++) {
        for (let j = i+1; j < state.orbs.length; j++) {
            const a = state.orbs[i], b = state.orbs[j];
            if (a.dead || b.dead) continue;
            const d = dist(a.x, a.y, b.x, b.y);
            if (d < 100) state.arcs.push({ a, b, str: 1 - d/100 });
        }
    }
    
    // Projectiles
    for (let pi = 0; pi < state.projectiles.length; pi++) {
        const p = state.projectiles[pi];
        p.trail.push({ x: p.x, y: p.y, life: 1 });
        p.x += Math.cos(p.ang) * p.speed;
        p.y += Math.sin(p.ang) * p.speed;
        // Trail cleanup (in-place)
        for (let ti = p.trail.length - 1; ti >= 0; ti--) {
            p.trail[ti].life -= dt * 5;
            if (p.trail[ti].life <= 0) p.trail.splice(ti, 1);
        }
        if (p.trail.length > 8) p.trail.length = 8;
        
        const d = dist(p.x, p.y, CENTER, CENTER);
        const pa = ang(p.x, p.y);
        
        // Ring collision
        if (d > R.ring - R.ringW/2 && d < R.ring + R.ringW/2) {
            const ra = normAng(pa - state.ring.angle);
            for (const w of state.ring.walls) {
                const ws = normAng(w.s), we = normAng(w.e);
                if ((ws < we && ra >= ws && ra <= we) || (ws >= we && (ra >= ws || ra <= we))) {
                    p.life = 0;
                    for (let i = 0; i < 15; i++) {
                        const a = Math.random() * Math.PI * 2;
                        state.particles.push({ x: p.x, y: p.y, vx: Math.cos(a)*4, vy: Math.sin(a)*4, life: 0.3, col: COL.energy, size: 2 });
                    }
                    break;
                }
            }
        }
        
        // Barrier collision (check both players' barriers)
        if (p.life > 0) {
            state.players.forEach((pl, idx) => {
                pl.barriers.forEach(bar => {
                    if (bar.hp <= 0) return;
                    
                    // Check if projectile is at barrier's radius and angle
                    const barDist = Math.abs(d - bar.radius);
                    const barAngDiff = Math.abs(angDiff(pa, bar.ang));
                    
                    if (barDist < 18 && barAngDiff < bar.size + 0.05) {
                        // Hit barrier!
                        const barrierDmg = p.heavy ? 2 : 1; // Lance does double damage
                        bar.hp -= barrierDmg;
                        bar.flash = 1;
                        p.life = 0;
                        
                        const barCol = idx === 0 ? COL.p1 : COL.p2;
                        
                        if (bar.hp <= 0) {
                            // Destroyed! Big effect
                            playSound('barrier_break', { pan: getPan(p.x) });
                            for (let i = 0; i < 35; i++) {
                                const a = Math.random() * Math.PI * 2;
                                const v = 2 + Math.random() * 6;
                                state.particles.push({ 
                                    x: p.x, y: p.y, 
                                    vx: Math.cos(a)*v, vy: Math.sin(a)*v, 
                                    life: 0.6, col: barCol.pri, size: 3 + Math.random()*4 
                                });
                            }
                            // Shards flying outward
                            for (let i = 0; i < 8; i++) {
                                const shardAng = bar.ang + (Math.random() - 0.5) * bar.size * 2;
                                const shardR = bar.radius + (Math.random() - 0.5) * 20;
                                const sx = CENTER + Math.cos(shardAng) * shardR;
                                const sy = CENTER + Math.sin(shardAng) * shardR;
                                const outAng = shardAng + (Math.random() - 0.5) * 0.5;
                                state.particles.push({
                                    x: sx, y: sy,
                                    vx: Math.cos(outAng) * (3 + Math.random() * 4),
                                    vy: Math.sin(outAng) * (3 + Math.random() * 4),
                                    life: 0.8, col: barCol.sec, size: 5 + Math.random() * 4
                                });
                            }
                        } else {
                            // Damaged but not destroyed
                            playSound('barrier_hit', { pan: getPan(p.x) });
                            for (let i = 0; i < 15; i++) {
                                const a = Math.random() * Math.PI * 2;
                                state.particles.push({ 
                                    x: p.x, y: p.y, 
                                    vx: Math.cos(a)*3, vy: Math.sin(a)*3, 
                                    life: 0.4, col: barCol.sec, size: 2 + Math.random()*2 
                                });
                            }
                        }
                    }
                });
            });
        }
        
        // Hit player
        if (d > R.life - R.lifeW * 2 && p.life > 0) {
            const tid = 1 - p.pid;
            if (inZone(p.x, p.y, tid)) {
                const target = state.players[tid];
                const col = p.pid === 0 ? COL.p1 : COL.p2;
                target.hp -= p.dmg;
                target.flash = 1;
                p.life = 0;
                playSound('hit', { pan: getPan(p.x), volume: p.heavy ? 1.2 : 1 });
                for (let i = 0; i < 40; i++) {
                    const a = Math.random() * Math.PI * 2;
                    const v = 3 + Math.random() * 7;
                    state.particles.push({ x: p.x, y: p.y, vx: Math.cos(a)*v, vy: Math.sin(a)*v, life: 0.5, col: col.pri, size: 3 + Math.random()*4 });
                }
            }
        }
        
        if (d > R.outer + 20) p.life = 0;
    }
    // In-place projectile removal
    for (let i = state.projectiles.length - 1; i >= 0; i--) {
        if (state.projectiles[i].life <= 0) state.projectiles.splice(i, 1);
    }

    // Beams (in-place removal)
    for (let i = state.beams.length - 1; i >= 0; i--) {
        const b = state.beams[i];
        b.life -= (b.type === 'drain') ? dt * 1.2 : dt * 3;
        if (b.life <= 0) state.beams.splice(i, 1);
    }

    // Particles (in-place removal with hard cap)
    for (let i = state.particles.length - 1; i >= 0; i--) {
        const p = state.particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vx *= 0.92; p.vy *= 0.92;
        p.life -= dt;
        if (p.life <= 0) state.particles.splice(i, 1);
    }
    if (state.particles.length > MAX_PARTICLES) {
        state.particles.length = MAX_PARTICLES;
    }

    // Effects (in-place removal)
    for (let i = state.effects.length - 1; i >= 0; i--) {
        state.effects[i].life -= dt * 2.5;
        if (state.effects[i].life <= 0) state.effects.splice(i, 1);
    }
    
    // Players
    state.players.forEach(p => {
        if (p.flash > 0) p.flash -= dt * 4;
        if (p.eFlash > 0) p.eFlash -= dt * 3;
        p.hp = Math.max(0, p.hp);
        // Barrier flash decay
        p.barriers.forEach(b => {
            if (b.flash > 0) b.flash -= dt * 4;
        });
    });
    
    // Ring
    state.ring.angle += angDiff(state.ring.angle, state.ring.target) * 0.1;
}

function checkWin() {
    for (let i = 0; i < 2; i++) {
        if (state.players[i].hp <= 0) { endGame(1-i); return true; }
    }
    return false;
}

function updateEnergyHUD() {
    state.players.forEach((p, i) => {
        const el = document.getElementById(i === 0 ? 'energyTop' : 'energyBottom');
        el.className = 'energyHud ' + (i === 0 ? 'top p1' : 'bottom p2');
        let html = `<span class="label">${i === 0 ? 'EMBER' : 'FROST'}</span>`;
        for (let e = 0; e < p.maxEnergy; e++) {
            html += `<div class="pip ${e < p.energy ? 'full' : ''}"></div>`;
        }
        el.innerHTML = html;
    });
}

// ═══════════════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════════════
function draw() {
    const c = ctx;
    c.clearRect(0, 0, SIZE, SIZE);
    
    c.save();
    c.beginPath();
    c.arc(CENTER, CENTER, R.outer, 0, Math.PI * 2);
    c.clip();
    
    // Animated runes
    if (!PERF_MODE) {
        state.runes.forEach(r => {
            const pulse = Math.sin(state.time * 0.5 + r.phase) * 0.5 + 0.5;
            drawRune(c, r.seed, r.x, r.y, r.size, r.alpha * (0.5 + pulse * 0.5));
        });
    } else {
        // Static runes in perf mode
        state.runes.forEach(r => {
            drawRune(c, r.seed, r.x, r.y, r.size, r.alpha * 0.7);
        });
    }
    
    // Central eye
    const eye = c.createRadialGradient(CENTER, CENTER, 0, CENTER, CENTER, R.eye);
    eye.addColorStop(0, 'rgba(140, 120, 180, 0.3)');
    eye.addColorStop(0.6, 'rgba(100, 80, 140, 0.1)');
    eye.addColorStop(1, 'transparent');
    c.fillStyle = eye;
    c.beginPath();
    c.arc(CENTER, CENTER, R.eye, 0, Math.PI * 2);
    c.fill();
    
    // Rotating inner sigil
    c.save();
    c.translate(CENTER, CENTER);
    c.rotate(state.time * 0.2);
    c.strokeStyle = 'rgba(140, 120, 180, 0.2)';
    c.lineWidth = 1;
    for (let i = 0; i < 6; i++) {
        const a = i * Math.PI / 3;
        c.beginPath();
        c.moveTo(Math.cos(a) * 8, Math.sin(a) * 8);
        c.lineTo(Math.cos(a) * R.eye * 0.8, Math.sin(a) * R.eye * 0.8);
        c.stroke();
    }
    c.restore();
    
    // Ring
    c.save();
    c.translate(CENTER, CENTER);
    c.rotate(state.ring.angle);
    c.strokeStyle = COL.ring;
    c.lineWidth = R.ringW;
    c.lineCap = 'round';
    c.beginPath();
    c.arc(0, 0, R.ring, 0, Math.PI * 2);
    c.stroke();
    c.shadowBlur = 12;
    c.shadowColor = COL.glow;
    c.strokeStyle = COL.energy;
    c.lineWidth = 3;
    state.ring.walls.forEach(w => {
        c.beginPath();
        c.arc(0, 0, R.ring, w.s, w.e);
        c.stroke();
    });
    c.shadowBlur = 0;
    c.restore();
    
    // Player barriers
    state.players.forEach((p, pid) => {
        const col = pid === 0 ? COL.p1 : COL.p2;
        
        p.barriers.forEach(bar => {
            if (bar.hp <= 0) return;
            
            const damaged = bar.hp < bar.maxHp;
            const flash = bar.flash > 0 ? bar.flash : 0;
            const pulse = Math.sin(state.time * 2 + bar.seed * 10) * 0.1;
            
            // Main barrier arc
            c.save();
            c.translate(CENTER, CENTER);
            
            // Outer glow
            c.globalAlpha = (0.25 + pulse + flash * 0.4);
            c.strokeStyle = col.glow;
            c.lineWidth = 18;
            c.lineCap = 'round';
            c.beginPath();
            c.arc(0, 0, bar.radius, bar.ang - bar.size, bar.ang + bar.size);
            c.stroke();
            
            // Main body
            c.globalAlpha = 0.7 + flash * 0.3;
            const barGrad = c.createLinearGradient(
                Math.cos(bar.ang) * (bar.radius - 10), Math.sin(bar.ang) * (bar.radius - 10),
                Math.cos(bar.ang) * (bar.radius + 10), Math.sin(bar.ang) * (bar.radius + 10)
            );
            barGrad.addColorStop(0, col.dim);
            barGrad.addColorStop(0.5, damaged ? 'rgba(60,60,70,0.8)' : col.pri);
            barGrad.addColorStop(1, col.dim);
            c.strokeStyle = barGrad;
            c.lineWidth = 10;
            c.beginPath();
            c.arc(0, 0, bar.radius, bar.ang - bar.size, bar.ang + bar.size);
            c.stroke();
            
            // Inner bright edge
            c.globalAlpha = 0.9;
            c.strokeStyle = damaged ? 'rgba(180,180,190,0.6)' : col.sec;
            c.lineWidth = 2;
            c.beginPath();
            c.arc(0, 0, bar.radius, bar.ang - bar.size, bar.ang + bar.size);
            c.stroke();
            
            // Crack lines if damaged
            if (damaged) {
                c.globalAlpha = 0.6;
                c.strokeStyle = '#222';
                c.lineWidth = 1.5;
                
                // Generate deterministic cracks based on seed
                const numCracks = 3;
                for (let i = 0; i < numCracks; i++) {
                    const crackAng = bar.ang + (bar.seed * 10 + i * 0.8 - 1.2) * bar.size * 0.5;
                    const crackStart = bar.radius - 4;
                    const crackEnd = bar.radius + 4;
                    
                    c.beginPath();
                    c.moveTo(Math.cos(crackAng) * crackStart, Math.sin(crackAng) * crackStart);
                    
                    // Jagged crack
                    const midR = (crackStart + crackEnd) / 2;
                    const jitter = (bar.seed * (i + 1) % 1 - 0.5) * 0.08;
                    c.lineTo(Math.cos(crackAng + jitter) * midR, Math.sin(crackAng + jitter) * midR);
                    c.lineTo(Math.cos(crackAng - jitter * 0.5) * crackEnd, Math.sin(crackAng - jitter * 0.5) * crackEnd);
                    c.stroke();
                }
            }
            
            // End caps (small circles at arc ends)
            c.globalAlpha = 0.8;
            c.fillStyle = col.pri;
            const endAngles = [bar.ang - bar.size, bar.ang + bar.size];
            endAngles.forEach(ea => {
                c.beginPath();
                c.arc(Math.cos(ea) * bar.radius, Math.sin(ea) * bar.radius, 4, 0, Math.PI * 2);
                c.fill();
            });
            
            // Rune/sigil decoration on barrier
            c.globalAlpha = 0.4;
            c.strokeStyle = col.sec;
            c.lineWidth = 1;
            const runeAng = bar.ang;
            const runeR = bar.radius;
            const runeX = Math.cos(runeAng) * runeR;
            const runeY = Math.sin(runeAng) * runeR;
            
            // Simple protective symbol
            c.beginPath();
            c.arc(runeX, runeY, 6, 0, Math.PI * 2);
            c.stroke();
            c.beginPath();
            c.moveTo(runeX, runeY - 8);
            c.lineTo(runeX, runeY + 8);
            c.moveTo(runeX - 8, runeY);
            c.lineTo(runeX + 8, runeY);
            c.stroke();
            
            c.globalAlpha = 1;
            c.restore();
        });
    });
    
    // Arc lightning between orbs - PROMINENT with varying colors
    state.arcs.forEach(arc => {
        const segs = PERF_MODE ? 5 : 10;
        const colA = arc.a.color;
        const colB = arc.b.color;
        
        // Draw multiple lightning strands (fewer in perf mode)
        const numStrands = PERF_MODE ? 1 : 3;
        for (let strand = 0; strand < numStrands; strand++) {
            // Gradient from one orb color to the other
            const grad = c.createLinearGradient(arc.a.x, arc.a.y, arc.b.x, arc.b.y);
            grad.addColorStop(0, colA.mid);
            grad.addColorStop(0.5, '#fff');
            grad.addColorStop(1, colB.mid);
            
            c.strokeStyle = grad;
            c.lineWidth = (2.5 - strand * 0.5) * arc.str;
            c.lineCap = 'round';
            c.globalAlpha = (0.5 + strand * 0.1) * arc.str;
            c.beginPath();
            
            for (let i = 0; i <= segs; i++) {
                const t = i / segs;
                const bx = lerp(arc.a.x, arc.b.x, t);
                const by = lerp(arc.a.y, arc.b.y, t);
                
                // Oscillating wave with noise
                const freq = 2 + strand;
                const amp = (8 + strand * 4) * arc.str;
                const wave = Math.sin(t * Math.PI * freq + state.time * (15 + strand * 5) + strand) * amp;
                const noise = PERF_MODE ? 0 : (Math.random() - 0.5) * 6 * arc.str;
                
                const px = -(arc.b.y - arc.a.y), py = arc.b.x - arc.a.x;
                const pl = Math.sqrt(px*px + py*py) || 1;
                const x = bx + (px/pl) * (wave + noise);
                const y = by + (py/pl) * (wave + noise);
                
                if (i === 0) c.moveTo(x, y); else c.lineTo(x, y);
            }
            c.stroke();
        }
        
        // Glow effect - blend both colors (skip in perf mode)
        if (!PERF_MODE) {
            c.shadowBlur = 10;
            c.shadowColor = colA.glow;
            c.strokeStyle = `rgba(255, 255, 255, ${0.4 * arc.str})`;
            c.lineWidth = 1.5;
            c.globalAlpha = arc.str;
            c.beginPath();
            for (let i = 0; i <= segs; i++) {
                const t = i / segs;
                const x = lerp(arc.a.x, arc.b.x, t);
                const y = lerp(arc.a.y, arc.b.y, t);
                if (i === 0) c.moveTo(x, y); else c.lineTo(x, y);
            }
            c.stroke();
            c.shadowBlur = 0;
        }
        c.globalAlpha = 1;
    });
    
    // Energy Orbs - with lightning halos and varying colors
    state.orbs.forEach(o => {
        if (o.dead) return;
        const pulse = PERF_MODE ? 0 : Math.sin(state.time * 4 + o.phase);
        const sz = 10 + pulse * 2;
        const col = o.color;
        c.globalAlpha = o.life;
        
        // Outer lightning halo - in orb's color (simplified in perf mode)
        if (!PERF_MODE) {
            const numBolts = 8;
            for (let b = 0; b < numBolts; b++) {
                const baseAng = (b / numBolts) * Math.PI * 2 + state.time * 2 + o.phase;
                const boltLen = sz * 1.8 + Math.sin(state.time * 8 + b + o.phase) * sz * 0.6;
                
                c.strokeStyle = col.mid;
                c.globalAlpha = o.life * (0.3 + Math.random() * 0.3);
                c.lineWidth = 1.5;
                c.beginPath();
                
                let bx = o.x, by = o.y;
                c.moveTo(bx + Math.cos(baseAng) * sz * 0.8, by + Math.sin(baseAng) * sz * 0.8);
                
                const steps = 4;
                for (let s = 1; s <= steps; s++) {
                    const t = s / steps;
                    const jitter = (Math.random() - 0.5) * 8;
                    const jitterAng = baseAng + jitter * 0.1;
                    const r = sz * 0.8 + boltLen * t;
                    bx = o.x + Math.cos(jitterAng) * r + (Math.random() - 0.5) * 4;
                    by = o.y + Math.sin(jitterAng) * r + (Math.random() - 0.5) * 4;
                    c.lineTo(bx, by);
                }
                c.stroke();
            }
        }
        c.globalAlpha = o.life;
        
        // Glow layers - using orb colors (simplified in perf mode)
        if (!PERF_MODE) {
            const glow3 = c.createRadialGradient(o.x, o.y, sz * 0.5, o.x, o.y, sz * 3.5);
            glow3.addColorStop(0, col.mid);
            glow3.addColorStop(0.4, col.outer);
            glow3.addColorStop(1, 'transparent');
            c.globalAlpha = o.life * 0.3;
            c.fillStyle = glow3;
            c.beginPath();
            c.arc(o.x, o.y, sz * 3.5, 0, Math.PI * 2);
            c.fill();
            c.globalAlpha = o.life;
        }
        
        const glow2 = c.createRadialGradient(o.x, o.y, 0, o.x, o.y, sz * (PERF_MODE ? 1.5 : 2));
        glow2.addColorStop(0, 'rgba(255, 255, 255, 0.6)');
        glow2.addColorStop(0.3, col.mid);
        glow2.addColorStop(0.7, col.outer);
        glow2.addColorStop(1, 'transparent');
        c.fillStyle = glow2;
        c.beginPath();
        c.arc(o.x, o.y, sz * (PERF_MODE ? 1.5 : 2), 0, Math.PI * 2);
        c.fill();
        
        // Core with inner detail - using orb colors
        if (!PERF_MODE) {
            c.shadowBlur = 15;
            c.shadowColor = col.glow;
        }
        
        const core = c.createRadialGradient(o.x - sz*0.2, o.y - sz*0.2, 0, o.x, o.y, sz);
        core.addColorStop(0, '#fff');
        core.addColorStop(0.3, col.core);
        core.addColorStop(0.6, col.mid);
        core.addColorStop(1, col.outer);
        c.fillStyle = core;
        c.beginPath();
        c.arc(o.x, o.y, sz, 0, Math.PI * 2);
        c.fill();
        
        // Inner sparkle ring (skip in perf mode)
        if (!PERF_MODE) {
            c.strokeStyle = 'rgba(255, 255, 255, 0.6)';
            c.lineWidth = 1;
            c.beginPath();
            c.arc(o.x, o.y, sz * 0.5, 0, Math.PI * 2);
            c.stroke();
        }
        
        // Highlight
        c.fillStyle = 'rgba(255, 255, 255, 0.9)';
        c.beginPath();
        c.arc(o.x - sz * 0.3, o.y - sz * 0.3, sz * 0.25, 0, Math.PI * 2);
        c.fill();
        
        c.shadowBlur = 0;
        c.globalAlpha = 1;
    });
    
    // Spell buttons
    state.players.forEach((p, pid) => {
        const col = pid === 0 ? COL.p1 : COL.p2;
        getSpellBtns(pid).forEach(btn => {
            const afford = p.energy >= btn.spell.cost;
            // Check if any pointer is targeting this spell button (multi-touch)
            let active = false;
            for (const ptr of state.pointers.values()) {
                if (ptr.type === 'spell' && ptr.spell.id === btn.spell.id && ptr.pid === pid) {
                    active = true;
                    break;
                }
            }
            
            // Background glow
            c.globalAlpha = active ? 0.8 : (afford ? 0.5 : 0.15);
            const bg = c.createRadialGradient(btn.x, btn.y, 0, btn.x, btn.y, btn.r);
            bg.addColorStop(0, afford ? col.dim : 'rgba(30,30,40,0.3)');
            bg.addColorStop(1, 'transparent');
            c.fillStyle = bg;
            c.beginPath();
            c.arc(btn.x, btn.y, btn.r, 0, Math.PI * 2);
            c.fill();
            
            // Ring
            c.strokeStyle = afford ? col.pri : 'rgba(80,80,100,0.3)';
            c.lineWidth = active ? 2.5 : 1.5;
            c.beginPath();
            c.arc(btn.x, btn.y, btn.r - 3, 0, Math.PI * 2);
            c.stroke();
            
            // Sigil
            c.globalAlpha = afford ? (active ? 1 : 0.7) : 0.2;
            drawSigil(c, btn.spell.id, btn.x, btn.y, btn.r * 1.4, afford ? col.pri : '#555');
            
            c.globalAlpha = 1;
        });
    });
    
    // Aim lines - draw for all active spell pointers (multi-touch)
    for (const ptr of state.pointers.values()) {
        if (ptr.type !== 'spell') continue;
        const col = ptr.pid === 0 ? COL.p1 : COL.p2;
        const dx = ptr.x - ptr.sx, dy = ptr.y - ptr.sy;
        const len = Math.sqrt(dx*dx + dy*dy);

        if (len > 15) {
            const aimAng = Math.atan2(dy, dx);

            // Special preview for WARD spell - show barrier arc
            if (ptr.spell.id === 'ward') {
                const p = state.players[ptr.pid];

                // Calculate where barrier would appear
                let previewAng = aimAng;
                const maxDev = Math.PI * 0.45;
                const dev = angDiff(p.angle, previewAng);
                if (Math.abs(dev) > maxDev) {
                    previewAng = p.angle + Math.sign(dev) * maxDev;
                }

                const endDist = dist(ptr.x, ptr.y, CENTER, CENTER);
                const minR = R.cast + 15;
                const maxR = R.life - 20;
                let previewR = Math.max(minR, Math.min(maxR, endDist));

                // Draw preview arc
                c.save();
                c.translate(CENTER, CENTER);
                c.strokeStyle = col.sec;
                c.lineWidth = 8;
                c.lineCap = 'round';
                c.globalAlpha = 0.4 + Math.sin(state.time * 6) * 0.1;
                c.setLineDash([6, 6]);
                c.beginPath();
                c.arc(0, 0, previewR, previewAng - 0.15, previewAng + 0.15);
                c.stroke();
                c.setLineDash([]);
                c.restore();

                // Dashed line to preview location
                c.strokeStyle = col.pri;
                c.lineWidth = 1.5;
                c.globalAlpha = 0.5;
                c.setLineDash([4, 4]);
                c.beginPath();
                c.moveTo(ptr.sx, ptr.sy);
                const previewX = CENTER + Math.cos(previewAng) * previewR;
                const previewY = CENTER + Math.sin(previewAng) * previewR;
                c.lineTo(previewX, previewY);
                c.stroke();
                c.setLineDash([]);
                c.globalAlpha = 1;
            } else {
                // Standard aim line for other spells
                c.strokeStyle = col.pri;
                c.lineWidth = 2;
                c.globalAlpha = 0.7;
                c.setLineDash([8, 4]);
                c.beginPath();
                c.moveTo(ptr.sx, ptr.sy);
                c.lineTo(ptr.x, ptr.y);
                c.stroke();
                c.setLineDash([]);

                // Arrow
                c.fillStyle = col.pri;
                c.beginPath();
                c.moveTo(ptr.x, ptr.y);
                c.lineTo(ptr.x - Math.cos(aimAng - 0.35) * 12, ptr.y - Math.sin(aimAng - 0.35) * 12);
                c.lineTo(ptr.x - Math.cos(aimAng + 0.35) * 12, ptr.y - Math.sin(aimAng + 0.35) * 12);
                c.closePath();
                c.fill();
                c.globalAlpha = 1;
            }
        }
    }
    
    // Players
    state.players.forEach((p, i) => {
        const hp = p.hp / 100;
        const col = i === 0 ? COL.p1 : COL.p2;
        const half = Math.PI / 2;
        
        // Hit flash
        if (p.flash > 0) {
            c.globalAlpha = p.flash * 0.35;
            c.fillStyle = col.pri;
            c.beginPath();
            c.arc(CENTER, CENTER, R.life + 15, p.angle - half, p.angle + half);
            c.arc(CENTER, CENTER, R.cast - 10, p.angle + half, p.angle - half, true);
            c.fill();
            c.globalAlpha = 1;
        }
        
        // Life arc background
        c.strokeStyle = col.dim;
        c.lineWidth = R.lifeW;
        c.lineCap = 'round';
        c.beginPath();
        c.arc(CENTER, CENTER, R.life, p.angle - half, p.angle + half);
        c.stroke();
        
        // Life arc
        const hArc = half * hp;
        c.strokeStyle = col.pri;
        c.beginPath();
        c.arc(CENTER, CENTER, R.life, p.angle - hArc, p.angle + hArc);
        c.stroke();
        
        if (hp > 0.15) {
            c.shadowBlur = 8;
            c.shadowColor = col.glow;
            c.strokeStyle = col.sec;
            c.lineWidth = 2;
            c.beginPath();
            c.arc(CENTER, CENTER, R.life, p.angle - hArc, p.angle + hArc);
            c.stroke();
            c.shadowBlur = 0;
        }
        
        // Energy pips on life ring (smaller, HUD shows main display)
        const eFlash = p.eFlash > 0 ? p.eFlash : 0;
        for (let e = 0; e < p.maxEnergy; e++) {
            const ea = p.angle - Math.PI * 0.28 + (e / (p.maxEnergy - 1)) * Math.PI * 0.56;
            const bob = Math.sin(state.time * 2.5 + e * 0.6) * 1.5;
            const ex = CENTER + Math.cos(ea) * (R.life + 18 + bob);
            const ey = CENTER + Math.sin(ea) * (R.life + 18 + bob);
            const has = e < p.energy;
            const isNew = e === p.energy - 1 && eFlash > 0;
            
            if (has) {
                // Small lightning sparks around pip
                if (Math.random() > 0.7) {
                    const sparkAng = Math.random() * Math.PI * 2;
                    const sparkLen = 4 + Math.random() * 6;
                    c.strokeStyle = `rgba(212, 208, 196, ${0.3 + Math.random() * 0.3})`;
                    c.lineWidth = 1;
                    c.beginPath();
                    c.moveTo(ex + Math.cos(sparkAng) * 3, ey + Math.sin(sparkAng) * 3);
                    c.lineTo(ex + Math.cos(sparkAng) * sparkLen, ey + Math.sin(sparkAng) * sparkLen);
                    c.stroke();
                }
                
                const gs = 8 + (isNew ? eFlash * 8 : 0);
                const gg = c.createRadialGradient(ex, ey, 0, ex, ey, gs);
                gg.addColorStop(0, 'rgba(212, 208, 196, 0.5)');
                gg.addColorStop(0.5, col.glow);
                gg.addColorStop(1, 'transparent');
                c.fillStyle = gg;
                c.beginPath();
                c.arc(ex, ey, gs, 0, Math.PI * 2);
                c.fill();
                
                const cs = 3.5 + Math.sin(state.time * 3 + e) * 0.5 + (isNew ? eFlash * 2 : 0);
                const cg = c.createRadialGradient(ex - 0.5, ey - 0.5, 0, ex, ey, cs);
                cg.addColorStop(0, '#fff');
                cg.addColorStop(0.5, COL.energy);
                cg.addColorStop(1, col.pri);
                c.fillStyle = cg;
                c.beginPath();
                c.arc(ex, ey, cs, 0, Math.PI * 2);
                c.fill();
            } else {
                c.strokeStyle = 'rgba(212, 208, 196, 0.08)';
                c.lineWidth = 1;
                c.beginPath();
                c.arc(ex, ey, 3, 0, Math.PI * 2);
                c.stroke();
            }
        }
    });
    
    // Projectiles
    state.projectiles.forEach(p => {
        const col = p.pid === 0 ? COL.p1 : COL.p2;
        
        // Trail
        if (p.trail.length > 1) {
            c.strokeStyle = col.pri;
            c.lineWidth = p.heavy ? 4 : 2;
            c.lineCap = 'round';
            c.beginPath();
            p.trail.forEach((t, i) => {
                c.globalAlpha = t.life * 0.4;
                if (i === 0) c.moveTo(t.x, t.y); else c.lineTo(t.x, t.y);
            });
            c.stroke();
        }
        c.globalAlpha = 1;
        
        // Head
        c.save();
        c.translate(p.x, p.y);
        c.rotate(p.ang);
        c.shadowBlur = 12;
        c.shadowColor = col.glow;
        c.fillStyle = col.pri;
        
        if (p.heavy) {
            // Lance - bigger, more angular
            c.beginPath();
            c.moveTo(22, 0);
            c.lineTo(-8, 12);
            c.lineTo(0, 0);
            c.lineTo(-8, -12);
            c.closePath();
            c.fill();
        } else {
            // Bolt - sleek
            c.beginPath();
            c.moveTo(16, 0);
            c.lineTo(-8, 6);
            c.lineTo(-4, 0);
            c.lineTo(-8, -6);
            c.closePath();
            c.fill();
        }
        
        c.fillStyle = '#fff';
        c.beginPath();
        c.arc(4, 0, p.heavy ? 4 : 2.5, 0, Math.PI * 2);
        c.fill();
        c.shadowBlur = 0;
        c.restore();
    });
    
    // Beams
    state.beams.forEach(b => {
        const col = b.pid === 0 ? COL.p1 : COL.p2;
        
        if (b.type === 'drain') {
            // Drain beam - flows from victim to stealer with color transition
            const fromCol = b.fromCol === 0 ? COL.p1 : COL.p2;
            const toCol = b.toCol === 0 ? COL.p1 : COL.p2;
            
            // Animated flow effect - energy packets moving along beam
            const numPackets = 8;
            const progress = 1 - b.life; // 0 to 1 as beam fades
            
            // Draw the main beam with gradient
            const grad = c.createLinearGradient(b.sx, b.sy, b.ex, b.ey);
            grad.addColorStop(0, fromCol.pri);
            grad.addColorStop(0.5, COL.energy);
            grad.addColorStop(1, toCol.pri);
            
            c.globalAlpha = b.life * 0.7;
            c.strokeStyle = grad;
            c.lineWidth = 3 + b.life * 4;
            c.lineCap = 'round';
            c.beginPath();
            c.moveTo(b.sx, b.sy);
            c.lineTo(b.ex, b.ey);
            c.stroke();
            
            // Glow
            c.shadowBlur = 12;
            c.shadowColor = COL.glow;
            c.strokeStyle = 'rgba(255,255,255,0.4)';
            c.lineWidth = 2;
            c.beginPath();
            c.moveTo(b.sx, b.sy);
            c.lineTo(b.ex, b.ey);
            c.stroke();
            c.shadowBlur = 0;
            
            // Energy packets flowing along beam
            for (let i = 0; i < numPackets; i++) {
                const t = ((i / numPackets) + state.time * 3 + progress) % 1;
                const px = lerp(b.sx, b.ex, t);
                const py = lerp(b.sy, b.ey, t);
                
                // Color transitions along path
                const pGrad = c.createRadialGradient(px, py, 0, px, py, 8);
                if (t < 0.3) {
                    pGrad.addColorStop(0, '#fff');
                    pGrad.addColorStop(0.5, fromCol.sec);
                    pGrad.addColorStop(1, 'transparent');
                } else if (t > 0.7) {
                    pGrad.addColorStop(0, '#fff');
                    pGrad.addColorStop(0.5, toCol.sec);
                    pGrad.addColorStop(1, 'transparent');
                } else {
                    pGrad.addColorStop(0, '#fff');
                    pGrad.addColorStop(0.5, COL.energy);
                    pGrad.addColorStop(1, 'transparent');
                }
                
                c.globalAlpha = b.life * (0.5 + Math.sin(t * Math.PI) * 0.5);
                c.fillStyle = pGrad;
                c.beginPath();
                c.arc(px, py, 6 + Math.sin(state.time * 10 + i) * 2, 0, Math.PI * 2);
                c.fill();
            }
            
            // Lightning crackle along beam
            c.globalAlpha = b.life * 0.6;
            c.strokeStyle = COL.energy;
            c.lineWidth = 1;
            const segs = 12;
            for (let strand = 0; strand < 2; strand++) {
                c.beginPath();
                for (let i = 0; i <= segs; i++) {
                    const t = i / segs;
                    const bx = lerp(b.sx, b.ex, t);
                    const by = lerp(b.sy, b.ey, t);
                    const perpX = -(b.ey - b.sy), perpY = b.ex - b.sx;
                    const perpLen = Math.sqrt(perpX*perpX + perpY*perpY) || 1;
                    const wave = Math.sin(t * Math.PI * 4 + state.time * 20 + strand * Math.PI) * 10;
                    const noise = (Math.random() - 0.5) * 6;
                    const x = bx + (perpX/perpLen) * (wave + noise);
                    const y = by + (perpY/perpLen) * (wave + noise);
                    if (i === 0) c.moveTo(x, y); else c.lineTo(x, y);
                }
                c.stroke();
            }
            
        } else {
            // Attack beam (original style)
            c.globalAlpha = b.life;
            c.strokeStyle = col.sec;
            c.lineWidth = 4 + b.life * 6;
            c.lineCap = 'round';
            c.shadowBlur = 15;
            c.shadowColor = col.glow;
            c.beginPath();
            c.moveTo(b.sx, b.sy);
            c.lineTo(b.sx + Math.cos(b.ang) * b.length, b.sy + Math.sin(b.ang) * b.length);
            c.stroke();
            c.shadowBlur = 0;
        }
        c.globalAlpha = 1;
    });
    
    // Effects
    state.effects.forEach(e => {
        c.globalAlpha = e.life;
        c.strokeStyle = e.col;
        c.lineWidth = 2;
        
        if (e.type === 'absorb') {
            // Inward contracting rings
            const sz = e.life * 40 + 5;
            c.beginPath();
            c.arc(e.x, e.y, sz, 0, Math.PI * 2);
            c.stroke();
            c.beginPath();
            c.arc(e.x, e.y, sz * 0.6, 0, Math.PI * 2);
            c.stroke();
        } else if (e.type === 'ward') {
            // Ward creation - protective sigil forming
            const sz = 25 + (1 - e.life) * 15;
            const rot = state.time * 2;
            
            c.save();
            c.translate(e.x, e.y);
            c.rotate(rot);
            
            // Outer hexagon
            c.beginPath();
            for (let i = 0; i < 6; i++) {
                const a = i * Math.PI / 3;
                if (i === 0) c.moveTo(Math.cos(a) * sz, Math.sin(a) * sz);
                else c.lineTo(Math.cos(a) * sz, Math.sin(a) * sz);
            }
            c.closePath();
            c.stroke();
            
            // Inner cross
            c.lineWidth = 3;
            c.beginPath();
            c.moveTo(0, -sz * 0.6);
            c.lineTo(0, sz * 0.6);
            c.moveTo(-sz * 0.6, 0);
            c.lineTo(sz * 0.6, 0);
            c.stroke();
            
            // Center dot
            c.fillStyle = e.col;
            c.beginPath();
            c.arc(0, 0, 4, 0, Math.PI * 2);
            c.fill();
            
            c.restore();
        } else {
            // Expanding ring (cast effect)
            const sz = (1 - e.life) * 50 + 10;
            c.beginPath();
            c.arc(e.x, e.y, sz, 0, Math.PI * 2);
            c.stroke();
        }
    });
    c.globalAlpha = 1;
    
    // Particles
    state.particles.forEach(p => {
        c.globalAlpha = p.life;
        c.fillStyle = p.col;
        c.beginPath();
        c.arc(p.x, p.y, p.size * Math.min(1, p.life * 2), 0, Math.PI * 2);
        c.fill();
    });
    c.globalAlpha = 1;
    
    c.restore();
}

function drawFX() {
    const c = fxCtx;
    c.clearRect(0, 0, SIZE, SIZE);
    const v = c.createRadialGradient(CENTER, CENTER, R.inner, CENTER, CENTER, R.outer);
    v.addColorStop(0, 'transparent');
    v.addColorStop(0.8, 'transparent');
    v.addColorStop(1, 'rgba(0,0,0,0.5)');
    c.fillStyle = v;
    c.fillRect(0, 0, SIZE, SIZE);
    c.globalCompositeOperation = 'destination-in';
    c.beginPath();
    c.arc(CENTER, CENTER, R.outer, 0, Math.PI * 2);
    c.fill();
    c.globalCompositeOperation = 'source-over';
}

// ═══════════════════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════════════════
let last = 0, orbT = 0, lastFrame = 0;

function loop(ts) {
    // Frame throttling for performance mode
    if (PERF_MODE && ts - lastFrame < FRAME_TIME) {
        requestAnimationFrame(loop);
        return;
    }
    lastFrame = ts;
    
    const dt = Math.min((ts - last) / 1000, 0.1);
    last = ts;
    
    if (state.running) {
        orbT += dt;
        if (orbT > 0.9 && state.orbs.length < 6) { orbT = 0; spawnOrb(); }
        update(dt);
        checkWin();
        updateEnergyHUD();
    }
    
    draw();
    if (!PERF_MODE) drawFX(); // Skip FX layer in perf mode
    requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════════════
// TUTORIAL
// ═══════════════════════════════════════════════════════════════════
const TUTORIAL = [
    { title: 'THE CIRCLE', text: 'Two mages duel across a ritual circle.<br><br>Control your half. Break the opponent\'s life ring to win.' },
    { title: 'BARRIERS', text: 'Each side starts with protective barriers.<br><br>Barriers block attacks. Hit them <strong>twice</strong> to destroy.<br>Aim around them—or through them.' },
    { title: 'ENERGY', text: 'Orbs drift from the center outward.<br><br><strong>TAP orbs</strong> to collect energy.<br>Connected orbs chain together.' },
    { title: 'SPELLS', text: 'Four sigils arc through your zone.<br><br><strong>DRAG from a sigil</strong> to aim and cast.<br>Release to fire in that direction.', showSpells: true },
    { title: 'WARD SPELL', text: 'The WARD sigil creates a <strong>new barrier</strong> for yourself.<br><br>Aim where you want protection.<br>Reinforce your defenses!' },
    { title: 'THE RING', text: 'The central barrier blocks projectiles.<br><br><strong>DRAG the ring</strong> to rotate it.<br>Shield yourself or clear a shot.' },
    { title: 'BEGIN', text: 'Collect. Cast. Control.<br><br>Good luck, mage.' }
];

let tutStep = 0;

function showTutorial() {
    tutStep = 0;
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('tutorialOverlay').classList.remove('hidden');
    renderTut();
}

function renderTut() {
    const s = TUTORIAL[tutStep];
    let html = `<div class="tutStep">STEP ${tutStep + 1} / ${TUTORIAL.length}</div>`;
    html += `<div class="tutTitle">${s.title}</div>`;
    html += `<div class="tutText">${s.text}</div>`;
    
    if (s.showSpells) {
        html += '<div class="spellList">';
        SPELLS.forEach(sp => {
            html += `<div class="spellInfo"><canvas id="tut_${sp.id}" width="50" height="50"></canvas><div class="spellName">${sp.name}</div><div class="spellCost">${sp.cost} energy</div><div class="spellDesc">${sp.desc}</div></div>`;
        });
        html += '</div>';
    }
    
    document.getElementById('tutorialContent').innerHTML = html;
    
    if (s.showSpells) {
        SPELLS.forEach(sp => {
            const c = document.getElementById('tut_' + sp.id);
            if (c) drawSigil(c.getContext('2d'), sp.id, 25, 25, 40, COL.energy);
        });
    }
}

function nextTut() {
    tutStep++;
    if (tutStep >= TUTORIAL.length) {
        document.getElementById('tutorialOverlay').classList.add('hidden');
        startGame();
    } else renderTut();
}

// ═══════════════════════════════════════════════════════════════════
// GAME CONTROL
// ═══════════════════════════════════════════════════════════════════
function startGame() {
    state.running = true;
    state.time = 0;
    state.orbs = [];
    state.projectiles = [];
    state.beams = [];
    state.particles = [];
    state.effects = [];
    state.pointers.clear();
    state.ring.angle = 0;
    state.ring.target = 0;
    
    state.players.forEach((p, i) => {
        p.hp = 100;
        p.energy = 2;
        p.barriers = generateBarriers(i);
        p.flash = 0;
        p.eFlash = 0;
    });
    
    orbT = 0;
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('victoryScreen').classList.add('hidden');
    document.getElementById('energyTop').style.display = 'flex';
    document.getElementById('energyBottom').style.display = 'flex';
    updateEnergyHUD();
    
    setTimeout(() => { spawnOrb(); setTimeout(spawnOrb, 250); setTimeout(spawnOrb, 500); }, 150);
}

function endGame(winner) {
    state.running = false;
    const col = winner === 0 ? COL.p1 : COL.p2;
    document.getElementById('victorTitle').style.color = col.pri;
    document.getElementById('victorTitle').textContent = col.name + ' PREVAILS';
    document.getElementById('victoryScreen').classList.remove('hidden');
    document.getElementById('energyTop').style.display = 'none';
    document.getElementById('energyBottom').style.display = 'none';
    playSound('victory');
}

function showMenu() {
    state.running = false;
    document.getElementById('victoryScreen').classList.add('hidden');
    document.getElementById('startScreen').classList.remove('hidden');
    document.getElementById('energyTop').style.display = 'none';
    document.getElementById('energyBottom').style.display = 'none';
}

document.getElementById('tutorialBtn').onclick = e => { e.preventDefault(); resumeAudio(); showTutorial(); };
document.getElementById('quickPlayBtn').onclick = e => { e.preventDefault(); resumeAudio(); startGame(); };
document.getElementById('restartBtn').onclick = e => { e.preventDefault(); resumeAudio(); startGame(); };
document.getElementById('menuBtn').onclick = e => { e.preventDefault(); resumeAudio(); showMenu(); };
document.getElementById('tutorialOverlay').onclick = e => { e.preventDefault(); resumeAudio(); nextTut(); };

let muted = false;
document.getElementById('muteBtn').onclick = e => {
    e.preventDefault();
    resumeAudio();
    muted = !muted;
    if (masterGain) masterGain.gain.value = muted ? 0 : 0.5;
    document.getElementById('muteBtn').textContent = muted ? '🔇 Muted' : '🔊 Sound';
};

genBackground();
drawFX();
requestAnimationFrame(loop);
</script>
