<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=720, height=720, user-scalable=no">
  <title>NULL ARCANA</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --phosphor-intensity: 0.10;
      --scanline-intensity: 0.08;
      --bloom-intensity: 0.15;
      --halation-intensity: 0.03;
      --chromatic-shift: 1.2px;
      --vignette-intensity: 0.5;
      --noise-intensity: 0.02;
      --flicker-intensity: 0.025;
      --curvature-highlight: 0.05;
      
      /* Oracle Colors */
      --void: #0a0a0f;
      --phosphor: #00ff88;
      --amber: #ffaa00;
      --cyan: #00ffff;
      --magenta: #ff00aa;
      --blood: #ff3344;
      --bone: #f0f0e8;
      --rust: #cc5500;
      --violet: #aa44ff;
      --ice: #aaeeff;
    }

    html, body {
      width: 720px;
      height: 720px;
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', monospace;
    }

    .crt-viewport {
      position: relative;
      width: 720px;
      height: 720px;
      border-radius: 50%;
      overflow: hidden;
      transform-style: preserve-3d;
    }

    .content-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      background: var(--void);
    }

    /* ============================================
       TITLE SEQUENCE
       ============================================ */
    
    #title-sequence {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 90;
      transition: opacity 1s;
      background: radial-gradient(ellipse at center, rgba(10,10,15,1) 0%, rgba(10,10,15,0.95) 50%, rgba(10,10,15,0.8) 100%);
      border-radius: 50%;
    }
    
    #title-sequence.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    #title-sigil-display {
      position: absolute;
      width: 400px;
      height: 400px;
      top: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .title-sigil {
      position: absolute;
      opacity: 0;
      transition: all 0.5s ease-out;
    }
    
    .title-sigil svg {
      width: 100px;
      height: 100px;
      filter: drop-shadow(0 0 15px currentColor) drop-shadow(0 0 30px currentColor);
    }
    
    .title-sigil.active {
      opacity: 1;
      animation: sigil-pulse 0.8s ease-out;
    }
    
    .title-sigil.fading {
      opacity: 0.15;
      transform: scale(0.6);
      filter: blur(2px);
    }
    
    @keyframes sigil-pulse {
      0% { transform: scale(0.5); opacity: 0; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    
    /* Orbiting sigils */
    .orbit-sigil {
      position: absolute;
      opacity: 0.4;
    }
    
    .orbit-sigil svg {
      width: 30px;
      height: 30px;
      filter: drop-shadow(0 0 6px currentColor);
    }
    
    #title-text {
      position: absolute;
      bottom: 160px;
      z-index: 10;
      text-align: center;
      background: radial-gradient(ellipse at center, rgba(10,10,15,0.9) 0%, transparent 70%);
      padding: 20px 40px;
      border-radius: 20px;
    }
    
    #title-sigil-name {
      position: absolute;
      top: 350px;
      font-size: 11px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.6);
      transition: all 0.3s;
      text-shadow: 0 0 10px rgba(0,0,0,0.9);
    }
    
    #title-prompt {
      position: absolute;
      bottom: 120px;
      font-size: 11px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.5);
      animation: prompt-pulse 2s ease-in-out infinite;
    }
    
    @keyframes prompt-pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }

    /* ============================================
       ORACLE INTERFACE
       ============================================ */
    
    #oracle-container {
      position: absolute;
      width: 720px;
      height: 720px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Central Eye - the Oracle's presence */
    #oracle-eye {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 5;
      cursor: pointer;
    }

    #oracle-eye.dormant {
      width: 60px;
      height: 60px;
      background: radial-gradient(circle, rgba(0, 255, 136, 0.4) 0%, transparent 70%);
      animation: dormant-pulse 4s ease-in-out infinite;
    }

    #oracle-eye.awakening {
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, rgba(0, 255, 255, 0.3) 0%, rgba(170, 68, 255, 0.15) 50%, transparent 70%);
      animation: awaken-pulse 1s ease-out;
    }

    #oracle-eye.active {
      width: 80px;
      height: 80px;
      background: radial-gradient(circle, rgba(240, 240, 232, 0.2) 0%, rgba(255, 170, 0, 0.1) 30%, transparent 70%);
      animation: active-glow 2s ease-in-out infinite;
    }

    #oracle-eye.reading {
      width: 40px;
      height: 40px;
      background: radial-gradient(circle, rgba(255, 0, 170, 0.15) 0%, rgba(170, 68, 255, 0.1) 40%, transparent 70%);
      animation: reading-intense 0.5s ease-in-out infinite;
    }

    @keyframes dormant-pulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.1); }
    }

    @keyframes awaken-pulse {
      0% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 0.8; transform: scale(1.2); }
      100% { opacity: 0.6; transform: scale(1); }
    }

    @keyframes active-glow {
      0%, 100% { opacity: 0.5; filter: blur(15px); }
      50% { opacity: 0.7; filter: blur(20px); }
    }

    @keyframes reading-intense {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.6; }
    }

    /* Oracle Text Display */
    #oracle-text {
      position: absolute;
      width: 400px;
      text-align: center;
      color: #ffffff;
      font-size: 15px;
      line-height: 1.6;
      padding: 20px;
      opacity: 0;
      transition: opacity 0.5s;
      z-index: 60;
      text-shadow: 0 0 20px rgba(0,0,0,0.9), 0 0 40px rgba(0,0,0,0.7);
      background: radial-gradient(ellipse at center, rgba(10,10,15,0.85) 0%, rgba(10,10,15,0.4) 70%, transparent 100%);
      border-radius: 20px;
      pointer-events: none;
    }

    #oracle-text.visible {
      opacity: 1;
    }

    #oracle-text.top {
      top: 120px;
    }

    #oracle-text.bottom {
      bottom: 120px;
    }

    #oracle-text.center {
      top: 50%;
      transform: translateY(-50%);
    }

    .oracle-title {
      font-size: 22px;
      letter-spacing: 6px;
      margin-bottom: 8px;
      color: #00ff88;
      text-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
    }

    .oracle-subtitle {
      font-size: 11px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.7);
    }

    /* Sigil Ring - polar coordinate layout */
    #sigil-ring {
      position: absolute;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.8s;
      pointer-events: none;
    }

    #sigil-ring.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .sigil-slot {
      position: absolute;
      width: 55px;
      height: 55px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(10,10,15,0.7) 0%, transparent 70%);
    }

    .sigil-slot:hover,
    .sigil-slot:active {
      transform: scale(1.3);
      z-index: 100;
      background: radial-gradient(ellipse at center, rgba(10,10,15,0.9) 0%, transparent 70%);
    }

    .sigil-slot svg {
      width: 40px;
      height: 40px;
      filter: drop-shadow(0 0 8px currentColor) drop-shadow(0 0 3px currentColor);
      transition: all 0.3s;
      pointer-events: none;
    }

    .sigil-slot:hover svg,
    .sigil-slot:active svg {
      filter: drop-shadow(0 0 15px currentColor) drop-shadow(0 0 5px currentColor);
    }

    .sigil-slot.selected {
      animation: selected-pulse 0.5s ease-out;
    }

    .sigil-slot.dimmed {
      opacity: 0.2;
      pointer-events: none;
    }

    @keyframes selected-pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.5); }
      100% { transform: scale(0); opacity: 0; }
    }

    /* Selected Sigils Display */
    #selected-sigils {
      position: absolute;
      top: 100px;
      display: flex;
      gap: 30px;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s;
      z-index: 55;
    }

    #selected-sigils.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .selected-sigil {
      width: 80px;
      height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      background: radial-gradient(ellipse at center, rgba(10,10,15,0.85) 0%, transparent 70%);
      border-radius: 10px;
      padding: 8px;
    }

    .selected-sigil.revealed {
      opacity: 1;
      transform: scale(1);
    }

    .selected-sigil svg {
      width: 40px;
      height: 40px;
      filter: drop-shadow(0 0 10px currentColor);
    }

    .selected-sigil .label {
      font-size: 9px;
      letter-spacing: 1px;
      margin-top: 5px;
      color: #ffffff;
      text-shadow: 0 0 10px rgba(0,0,0,0.9);
    }

    /* Position Labels */
    .position-label {
      font-size: 8px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 3px;
      text-shadow: 0 0 10px rgba(0,0,0,0.9);
    }

    /* Iris Menu System */
    .iris-menu {
      position: absolute;
      width: 720px;
      height: 720px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s;
    }

    .iris-menu.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .iris-segment {
      position: absolute;
      width: 200px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--bone);
      font-size: 14px;
      letter-spacing: 3px;
      transition: all 0.3s;
      text-shadow: 0 0 10px currentColor;
    }

    .iris-segment:hover {
      color: var(--cyan);
      transform: scale(1.1);
    }

    /* Reading Display */
    #reading-display {
      position: absolute;
      width: 480px;
      height: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s;
      z-index: 70;
      padding: 50px;
      text-align: center;
      background: radial-gradient(ellipse at center, rgba(10,10,15,0.92) 0%, rgba(10,10,15,0.7) 60%, transparent 100%);
      border-radius: 50%;
    }

    #reading-display.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .reading-title {
      font-size: 13px;
      letter-spacing: 3px;
      margin-bottom: 15px;
      color: var(--amber);
      text-shadow: 0 0 10px currentColor;
    }

    .reading-content {
      font-size: 14px;
      line-height: 1.7;
      color: #ffffff;
      max-height: 260px;
      overflow-y: auto;
      padding: 10px;
      text-shadow: 0 0 15px rgba(0,0,0,0.8);
    }

    .reading-content::-webkit-scrollbar {
      width: 4px;
    }

    .reading-content::-webkit-scrollbar-track {
      background: transparent;
    }

    .reading-content::-webkit-scrollbar-thumb {
      background: var(--phosphor);
      border-radius: 2px;
    }

    /* Action Buttons */
    .action-btn {
      position: absolute;
      padding: 14px 28px;
      background: rgba(10, 10, 15, 0.9);
      border: 2px solid var(--phosphor);
      color: #ffffff;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.3s;
      text-shadow: 0 0 10px var(--phosphor);
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.3), inset 0 0 20px rgba(0, 255, 136, 0.1);
      z-index: 80;
    }

    .action-btn:hover,
    .action-btn:active {
      background: var(--phosphor);
      color: var(--void);
      text-shadow: none;
      box-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
    }

    #begin-btn {
      bottom: 180px;
      left: 50%;
      transform: translateX(-50%);
    }

    #continue-btn {
      bottom: 180px;
      left: 50%;
      transform: translateX(-50%);
    }

    #restart-btn {
      bottom: 180px;
      left: 50%;
      transform: translateX(-50%);
    }

    /* Decorative Ring */
    .deco-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid;
      opacity: 0.15;
      pointer-events: none;
    }

    .ring-outer {
      width: 580px;
      height: 580px;
      border-color: var(--phosphor);
      animation: ring-rotate 60s linear infinite;
    }

    .ring-mid {
      width: 420px;
      height: 420px;
      border-color: var(--cyan);
      animation: ring-rotate 45s linear infinite reverse;
    }

    .ring-inner {
      width: 260px;
      height: 260px;
      border-color: var(--amber);
      animation: ring-rotate 30s linear infinite;
    }

    @keyframes ring-rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Glitch effect for transitions */
    .glitch {
      animation: glitch 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes glitch {
      0% { filter: none; }
      20% { filter: hue-rotate(90deg) saturate(2); transform: translate(-2px, 1px); }
      40% { filter: hue-rotate(-90deg) saturate(0.5); transform: translate(2px, -1px); }
      60% { filter: hue-rotate(180deg); transform: translate(-1px, 2px); }
      80% { filter: hue-rotate(-180deg) saturate(1.5); transform: translate(1px, -2px); }
      100% { filter: none; transform: translate(0, 0); }
    }

    /* ============================================
       CRT EFFECTS (from provided filter)
       ============================================ */
    
    .crt-effects {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 100;
      pointer-events: none;
      border-radius: 50%;
      overflow: hidden;
    }

    .crt-effects * {
      pointer-events: none !important;
    }

    .phosphor-mask {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(ellipse 33% 100% at 16% 50%, 
          rgba(255, 0, 0, var(--phosphor-intensity)) 0%, 
          transparent 50%),
        radial-gradient(ellipse 33% 100% at 50% 50%, 
          rgba(0, 255, 0, var(--phosphor-intensity)) 0%, 
          transparent 50%),
        radial-gradient(ellipse 33% 100% at 84% 50%, 
          rgba(0, 100, 255, var(--phosphor-intensity)) 0%, 
          transparent 50%);
      background-size: 3px 3px;
      mix-blend-mode: screen;
      opacity: 0.9;
    }

    .slot-mask {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        repeating-linear-gradient(
          90deg,
          transparent 0px,
          transparent 2px,
          rgba(0, 0, 0, 0.25) 2px,
          rgba(0, 0, 0, 0.25) 3px
        ),
        repeating-linear-gradient(
          0deg,
          transparent 0px,
          transparent 2px,
          rgba(0, 0, 0, 0.15) 2px,
          rgba(0, 0, 0, 0.15) 3px
        );
      mix-blend-mode: multiply;
    }

    .scanlines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0, 0, 0, var(--scanline-intensity)) 2px,
        rgba(0, 0, 0, var(--scanline-intensity)) 4px
      );
      animation: scanline-jitter 0.016s steps(2) infinite;
    }

    @keyframes scanline-jitter {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(0.5px); }
    }

    .interlace {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 4px,
        rgba(0, 0, 0, 0.03) 4px,
        rgba(0, 0, 0, 0.03) 8px
      );
      animation: interlace-flicker 0.033s steps(2) infinite;
    }

    @keyframes interlace-flicker {
      0% { opacity: 1; }
      50% { opacity: 0.95; }
      100% { opacity: 1; }
    }

    .scan-beam {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        transparent 40%,
        rgba(255, 255, 255, 0.015) 45%,
        rgba(255, 255, 255, 0.03) 50%,
        rgba(255, 255, 255, 0.015) 55%,
        transparent 60%,
        transparent 100%
      );
      animation: beam-roll 4s linear infinite;
    }

    @keyframes beam-roll {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }

    .chromatic-r, .chromatic-g, .chromatic-b {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .chromatic-r {
      background: radial-gradient(
        ellipse at center,
        transparent 0%,
        transparent 70%,
        rgba(255, 0, 0, 0.06) 85%,
        rgba(255, 0, 0, 0.12) 100%
      );
      animation: chroma-r-drift 6s ease-in-out infinite;
    }

    .chromatic-g {
      background: radial-gradient(
        ellipse at center,
        transparent 0%,
        transparent 75%,
        rgba(0, 255, 0, 0.03) 88%,
        rgba(0, 255, 0, 0.06) 100%
      );
      animation: chroma-g-drift 9s ease-in-out infinite;
    }

    .chromatic-b {
      background: radial-gradient(
        ellipse at center,
        transparent 0%,
        transparent 68%,
        rgba(0, 80, 255, 0.05) 84%,
        rgba(0, 80, 255, 0.11) 100%
      );
      animation: chroma-b-drift 7.5s ease-in-out infinite;
    }

    @keyframes chroma-r-drift {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(calc(var(--chromatic-shift) * -1), calc(var(--chromatic-shift) * 0.3)); }
      50% { transform: translate(calc(var(--chromatic-shift) * -0.5), calc(var(--chromatic-shift) * -0.2)); }
      75% { transform: translate(calc(var(--chromatic-shift) * -1.2), calc(var(--chromatic-shift) * 0.5)); }
    }

    @keyframes chroma-g-drift {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(calc(var(--chromatic-shift) * 0.2), calc(var(--chromatic-shift) * -0.3)); }
      66% { transform: translate(calc(var(--chromatic-shift) * -0.2), calc(var(--chromatic-shift) * 0.2)); }
    }

    @keyframes chroma-b-drift {
      0%, 100% { transform: translate(0, 0); }
      20% { transform: translate(calc(var(--chromatic-shift) * 0.8), calc(var(--chromatic-shift) * 0.2)); }
      40% { transform: translate(calc(var(--chromatic-shift) * 1), calc(var(--chromatic-shift) * -0.3)); }
      60% { transform: translate(calc(var(--chromatic-shift) * 0.3), calc(var(--chromatic-shift) * 0.6)); }
      80% { transform: translate(calc(var(--chromatic-shift) * 0.9), calc(var(--chromatic-shift) * -0.4)); }
    }

    .halation {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(
        ellipse at center,
        rgba(255, 255, 255, var(--halation-intensity)) 0%,
        rgba(200, 255, 200, calc(var(--halation-intensity) * 0.5)) 30%,
        transparent 70%
      );
      mix-blend-mode: soft-light;
      animation: halation-pulse 3s ease-in-out infinite;
    }

    @keyframes halation-pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 0.8; }
    }

    .bloom {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      box-shadow: 
        inset 0 0 80px rgba(0, 255, 136, calc(var(--bloom-intensity) * 0.08)),
        inset 0 0 160px rgba(0, 200, 100, calc(var(--bloom-intensity) * 0.04));
      mix-blend-mode: screen;
      animation: bloom-breathe 2.5s ease-in-out infinite;
    }

    @keyframes bloom-breathe {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }

    .barrel-distort {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(
        ellipse at center,
        transparent 0%,
        transparent 60%,
        rgba(0, 0, 0, 0.05) 80%,
        rgba(0, 0, 0, 0.15) 95%,
        rgba(0, 0, 0, 0.3) 100%
      );
    }

    .glass-bubble {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(
          ellipse 50% 40% at 28% 22%,
          rgba(255, 255, 255, var(--curvature-highlight)) 0%,
          rgba(255, 255, 255, calc(var(--curvature-highlight) * 0.4)) 30%,
          transparent 60%
        ),
        radial-gradient(
          ellipse 30% 25% at 72% 78%,

    @keyframes noise-crawl {

      30% { transform: translate(-1%, 2%); }
      40% { transform: translate(2%, 1%); }
      50% { transform: translate(-2%, -1%); }
      60% { transform: translate(1%, 2%); }
      70% { transform: translate(-1%, -2%); }

    }

    .moire {
      position: absolute;
      top: 0;

      width: 100%;

      background: 
        repeating-linear-gradient(
          0deg,

          rgba(255, 255, 255, 0.003) 11px,

        ),
        repeating-linear-gradient(
          90deg,

    .flicker {

    @keyframes screen-flicker {

      32% { opacity: 1; }
      33% { opacity: calc(1 - var(--flicker-intensity) * 1.5); }

<body>

<script>
// ============================================
// NULL ARCANA - AUDIO ENGINE
// ============================================
// A generative soundscape that responds to the oracle's state
// Not music - a transmission from the space between

class AudioEngine {
  constructor() {
    this.ctx = null;
    this.initialized = false;
    this.state = 'silent';
    this.layers = {};
    this.params = {
      masterGain: 0.7,
      pulseRate: 0.3,
      tension: 0,
      depth: 0
    };
    
    // Tuning - slightly detuned for unease
    this.frequencies = {
      root: 55, // A1 - low, grounding
      fifth: 82.5, // E2 - hollow, ancient
      tritone: 77.78, // D#2 - the devil's interval
      minor2: 58.27, // A#1 - tension
      octave: 110,
      mains: 60 // electrical hum
    };
    
    // Suit timbres - each suit has a sonic character
    this.suitTimbres = {
      circuit: { wave: 'sawtooth', filter: 200, resonance: 2, attack: 0.01 },
      signal: { wave: 'sine', filter: 800, resonance: 8, attack: 0.1 },
      code: { wave: 'square', filter: 1200, resonance: 1, attack: 0.005 },
      maker: { wave: 'triangle', filter: 400, resonance: 4, attack: 0.02 },
      emergence: { wave: 'sine', filter: 2000, resonance: 12, attack: 0.2 },
      glitch: { wave: 'sawtooth', filter: 600, resonance: 15, attack: 0.001 }
    };
  }
  
  async init() {
    if (this.initialized) return;
    
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      
      // Master output chain
      this.master = this.ctx.createGain();
      this.master.gain.value = 0;
      
      // Master filter for overall tone shaping
      this.masterFilter = this.ctx.createBiquadFilter();
      this.masterFilter.type = 'lowpass';
      this.masterFilter.frequency.value = 2000;
      this.masterFilter.Q.value = 0.5;
      
      // Compressor to glue it together
      this.compressor = this.ctx.createDynamicsCompressor();
      this.compressor.threshold.value = -24;
      this.compressor.knee.value = 12;
      this.compressor.ratio.value = 4;
      this.compressor.attack.value = 0.003;
      this.compressor.release.value = 0.25;
      
      // Convolver for space (we'll create an impulse response)
      this.convolver = this.ctx.createConvolver();
      this.convolver.buffer = this.createReverbImpulse(3, 2);
      this.reverbGain = this.ctx.createGain();
      this.reverbGain.gain.value = 0.3;
      
      // Dry/wet routing
      this.dryGain = this.ctx.createGain();
      this.dryGain.gain.value = 0.7;
      
      // Connect master chain
      this.master.connect(this.masterFilter);
      this.masterFilter.connect(this.compressor);
      this.compressor.connect(this.dryGain);
      this.compressor.connect(this.convolver);
      this.convolver.connect(this.reverbGain);
      this.dryGain.connect(this.ctx.destination);
      this.reverbGain.connect(this.ctx.destination);
      
      // Create layers
      this.createSubstrateLayer();
      this.createStaticLayer();
      this.createPulseLayer();
      this.createToneLayer();
      
      this.initialized = true;
      
      // Start animation loop for parameter modulation
      this.animate();
      
    } catch (e) {
      console.warn('Audio initialization failed:', e);
    }
  }
  
  createReverbImpulse(duration, decay) {
    const length = this.ctx.sampleRate * duration;
    const impulse = this.ctx.createBuffer(2, length, this.ctx.sampleRate);
    
    for (let channel = 0; channel < 2; channel++) {
      const data = impulse.getChannelData(channel);
      for (let i = 0; i < length; i++) {
        // Exponential decay with some randomness
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
      }
    }
    return impulse;
  }
  
  // === THE SUBSTRATE ===
  // The electrical foundation - mains hum and harmonics
  createSubstrateLayer() {
    this.layers.substrate = {
      oscillators: [],
      gain: this.ctx.createGain()
    };
    
    this.layers.substrate.gain.gain.value = 0;
    this.layers.substrate.gain.connect(this.master);
    
    // Fundamental mains hum (60Hz) and harmonics
    const harmonics = [
      { freq: 60, gain: 0.15 },
      { freq: 120, gain: 0.08 },
      { freq: 180, gain: 0.04 },
      { freq: 240, gain: 0.02 }
    ];
    
    harmonics.forEach(h => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      
      osc.type = 'sine';
      osc.frequency.value = h.freq;
      gain.gain.value = h.gain;
      
      // Subtle frequency wobble - imperfect power
      const lfo = this.ctx.createOscillator();
      const lfoGain = this.ctx.createGain();
      lfo.frequency.value = 0.1 + Math.random() * 0.1;
      lfoGain.gain.value = 0.5;
      lfo.connect(lfoGain);
      lfoGain.connect(osc.frequency);
      lfo.start();
      
      osc.connect(gain);
      gain.connect(this.layers.substrate.gain);
      osc.start();
      
      this.layers.substrate.oscillators.push({ osc, gain, lfo });
    });
  }
  
  // === THE STATIC ===
  // Filtered noise - the space between stations
  createStaticLayer() {
    this.layers.static = {
      noise: null,
      filter: null,
      gain: this.ctx.createGain()
    };
    
    this.layers.static.gain.gain.value = 0;
    this.layers.static.gain.connect(this.master);
    
    // Create noise source using AudioWorklet alternative (buffer-based noise)
    const bufferSize = this.ctx.sampleRate * 2;
    const noiseBuffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = noiseBuffer.getChannelData(0);
    
    // Pink-ish noise (more natural than white)
    let b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
    for (let i = 0; i < bufferSize; i++) {
      const white = Math.random() * 2 - 1;
      b0 = 0.99886 * b0 + white * 0.0555179;
      b1 = 0.99332 * b1 + white * 0.0750759;
      b2 = 0.96900 * b2 + white * 0.1538520;
      b3 = 0.86650 * b3 + white * 0.3104856;
      b4 = 0.55000 * b4 + white * 0.5329522;
      b5 = -0.7616 * b5 - white * 0.0168980;
      data[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362) * 0.11;
      b6 = white * 0.115926;
    }
    
    this.layers.static.noiseBuffer = noiseBuffer;
    
    // Bandpass filter that will sweep
    this.layers.static.filter = this.ctx.createBiquadFilter();
    this.layers.static.filter.type = 'bandpass';
    this.layers.static.filter.frequency.value = 400;
    this.layers.static.filter.Q.value = 2;
    
    // Second filter for more control
    this.layers.static.filter2 = this.ctx.createBiquadFilter();
    this.layers.static.filter2.type = 'highpass';
    this.layers.static.filter2.frequency.value = 100;
    
    this.layers.static.filter.connect(this.layers.static.filter2);
    this.layers.static.filter2.connect(this.layers.static.gain);
    
    // Start noise loop
    this.startNoiseLoop();
  }
  
  startNoiseLoop() {
    if (!this.layers.static.noiseBuffer) return;
    
    const source = this.ctx.createBufferSource();
    source.buffer = this.layers.static.noiseBuffer;
    source.loop = true;
    source.connect(this.layers.static.filter);
    source.start();
    this.layers.static.noise = source;
  }
  
  // === THE PULSE ===
  // Not a beat - a presence. Irregular, organic, unsettling.
  createPulseLayer() {
    this.layers.pulse = {
      gain: this.ctx.createGain(),
      active: false,
      timeout: null
    };
    
    this.layers.pulse.gain.gain.value = 0;
    this.layers.pulse.gain.connect(this.master);
  }
  
  triggerPulse() {
    if (!this.initialized || this.state === 'silent') return;
    
    const now = this.ctx.currentTime;
    
    // Low thump - like a distant heartbeat or relay click
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    const filter = this.ctx.createBiquadFilter();
    
    osc.type = 'sine';
    osc.frequency.setValueAtTime(this.frequencies.root * (0.5 + Math.random() * 0.1), now);
    osc.frequency.exponentialRampToValueAtTime(30, now + 0.3);
    
    filter.type = 'lowpass';
    filter.frequency.value = 150;
    filter.Q.value = 8;
    
    const attackTime = 0.01;
    const decayTime = 0.2 + Math.random() * 0.3;
    const pulseGain = 0.3 + this.params.tension * 0.2;
    
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(pulseGain, now + attackTime);
    gain.gain.exponentialRampToValueAtTime(0.001, now + decayTime);
    
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(this.layers.pulse.gain);
    
    osc.start(now);
    osc.stop(now + decayTime + 0.1);
    
    // Sometimes add a metallic click
    if (Math.random() > 0.6) {
      this.triggerClick();
    }
    
    // Schedule next pulse (irregular timing)
    const baseInterval = 2000 / (this.params.pulseRate + 0.1);
    const variance = baseInterval * 0.5;
    const nextPulse = baseInterval + (Math.random() - 0.5) * variance;
    
    this.layers.pulse.timeout = setTimeout(() => this.triggerPulse(), nextPulse);
  }
  
  triggerClick() {
    const now = this.ctx.currentTime;
    
    // Short, sharp transient - like a relay or bit flip
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    const filter = this.ctx.createBiquadFilter();
    
    osc.type = 'square';
    osc.frequency.setValueAtTime(2000 + Math.random() * 3000, now);
    osc.frequency.exponentialRampToValueAtTime(200, now + 0.02);
    
    filter.type = 'bandpass';
    filter.frequency.value = 1500;
    filter.Q.value = 5;
    
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.08, now + 0.001);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
    
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(this.layers.pulse.gain);
    
    osc.start(now);
    osc.stop(now + 0.05);
  }
  
  // === THE TONES ===
  // Pitched elements - unsettled, unresolved
  createToneLayer() {
    this.layers.tones = {
      gain: this.ctx.createGain(),
      activeOscs: [],
      droneOsc: null,
      droneGain: null
    };
    
    this.layers.tones.gain.gain.value = 0;
    this.layers.tones.gain.connect(this.master);
  }
  
  startDrone() {
    if (this.layers.tones.droneOsc) return;
    
    const now = this.ctx.currentTime;
    
    // Low drone - root note with subtle movement
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    const filter = this.ctx.createBiquadFilter();
    
    osc.type = 'triangle';
    osc.frequency.value = this.frequencies.root;
    
    // Vibrato LFO
    const vibrato = this.ctx.createOscillator();
    const vibratoGain = this.ctx.createGain();
    vibrato.frequency.value = 0.2;
    vibratoGain.gain.value = 1;
    vibrato.connect(vibratoGain);
    vibratoGain.connect(osc.frequency);
    vibrato.start();
    
    filter.type = 'lowpass';
    filter.frequency.value = 300;
    filter.Q.value = 2;
    
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.15, now + 2);
    
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(this.layers.tones.gain);
    
    osc.start();
    
    this.layers.tones.droneOsc = osc;
    this.layers.tones.droneGain = gain;
    this.layers.tones.droneVibrato = vibrato;
    this.layers.tones.droneFilter = filter;
  }
  
  stopDrone() {
    if (!this.layers.tones.droneOsc) return;
    
    const now = this.ctx.currentTime;
    this.layers.tones.droneGain.gain.linearRampToValueAtTime(0, now + 2);
    
    setTimeout(() => {
      if (this.layers.tones.droneOsc) {
        this.layers.tones.droneOsc.stop();
        this.layers.tones.droneVibrato.stop();
        this.layers.tones.droneOsc = null;
      }
    }, 2500);
  }
  
  // Play an interval - two notes that create tension
  playInterval(interval = 'tritone', duration = 3) {
    if (!this.initialized) return;
    
    const now = this.ctx.currentTime;
    const intervals = {
      tritone: [this.frequencies.root, this.frequencies.tritone],
      fifth: [this.frequencies.root, this.frequencies.fifth],
      minor2: [this.frequencies.root, this.frequencies.minor2],
      octave: [this.frequencies.root, this.frequencies.octave]
    };
    
    const notes = intervals[interval] || intervals.tritone;
    
    notes.forEach((freq, i) => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      const filter = this.ctx.createBiquadFilter();
      
      osc.type = i === 0 ? 'triangle' : 'sine';
      osc.frequency.value = freq * (1 + (Math.random() - 0.5) * 0.01); // Slight detune
      
      filter.type = 'lowpass';
      filter.frequency.value = 800 + i * 400;
      filter.Q.value = 1;
      
      const attackTime = 0.5 + Math.random() * 0.5;
      const releaseTime = duration * 0.3;
      
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.08, now + attackTime);
      gain.gain.setValueAtTime(0.08, now + duration - releaseTime);
      gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
      
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(this.layers.tones.gain);
      
      osc.start(now);
      osc.stop(now + duration + 0.1);
    });
  }
  
  // === SIGIL SOUNDS ===
  // Each sigil has a voice based on its suit
  playSigilSound(sigil) {
    if (!this.initialized) return;
    
    const now = this.ctx.currentTime;
    const timbre = this.suitTimbres[sigil.suit];
    
    // Base frequency determined by which sigil in the suit
    const sigilIndex = Object.keys(SIGILS[sigil.suit].sigils).indexOf(sigil.key);
    const baseFreq = 220 * Math.pow(2, sigilIndex / 12); // Chromatic
    
    // Main tone
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    const filter = this.ctx.createBiquadFilter();
    
    osc.type = timbre.wave;
    osc.frequency.setValueAtTime(baseFreq * 2, now);
    osc.frequency.exponentialRampToValueAtTime(baseFreq, now + 0.1);
    
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(timbre.filter * 2, now);
    filter.frequency.exponentialRampToValueAtTime(timbre.filter, now + 0.3);
    filter.Q.value = timbre.resonance;
    
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.2, now + timbre.attack);
    gain.gain.exponentialRampToValueAtTime(0.05, now + 0.3);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 1.5);
    
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(this.master);
    
    osc.start(now);
    osc.stop(now + 2);
    
    // Harmonic overtone
    const osc2 = this.ctx.createOscillator();
    const gain2 = this.ctx.createGain();
    
    osc2.type = 'sine';
    osc2.frequency.value = baseFreq * 3;
    
    gain2.gain.setValueAtTime(0, now);
    gain2.gain.linearRampToValueAtTime(0.05, now + timbre.attack * 2);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + 1);
    
    osc2.connect(gain2);
    gain2.connect(this.master);
    
    osc2.start(now);
    osc2.stop(now + 1.5);
    
    // Click transient for tactile feedback
    this.triggerClick();
  }
  
  // === STATE TRANSITIONS ===
  
  setState(newState) {
    if (!this.initialized || this.state === newState) return;
    
    const now = this.ctx.currentTime;
    this.state = newState;
    
    switch (newState) {
      case 'title':
        // Distant, searching - like tuning a radio
        this.master.gain.linearRampToValueAtTime(this.params.masterGain * 0.5, now + 1);
        this.layers.substrate.gain.gain.linearRampToValueAtTime(0.4, now + 2);
        this.layers.static.gain.gain.linearRampToValueAtTime(0.25, now + 2);
        this.layers.pulse.gain.gain.linearRampToValueAtTime(0.3, now + 2);
        this.layers.tones.gain.gain.linearRampToValueAtTime(0.2, now + 2);
        this.params.pulseRate = 0.2;
        this.params.tension = 0.2;
        this.startDrone();
        if (!this.layers.pulse.timeout) this.triggerPulse();
        // Sweep the static filter
        this.layers.static.filter.frequency.linearRampToValueAtTime(300, now + 2);
        break;
        
      case 'awakening':
        // The signal locks in
        this.master.gain.linearRampToValueAtTime(this.params.masterGain * 0.7, now + 0.5);
        this.layers.static.gain.gain.linearRampToValueAtTime(0.15, now + 1);
        this.layers.static.filter.frequency.linearRampToValueAtTime(600, now + 1);
        this.playInterval('fifth', 4);
        break;
        
      case 'ready':
        // Waiting, present
        this.master.gain.linearRampToValueAtTime(this.params.masterGain * 0.6, now + 1);
        this.layers.substrate.gain.gain.linearRampToValueAtTime(0.5, now + 1);
        this.layers.static.gain.gain.linearRampToValueAtTime(0.1, now + 1);
        this.layers.pulse.gain.gain.linearRampToValueAtTime(0.4, now + 1);
        this.layers.tones.gain.gain.linearRampToValueAtTime(0.3, now + 1);
        this.params.pulseRate = 0.25;
        break;
        
      case 'selecting':
        // Active, responsive
        this.master.gain.linearRampToValueAtTime(this.params.masterGain * 0.7, now + 0.5);
        this.layers.substrate.gain.gain.linearRampToValueAtTime(0.3, now + 0.5);
        this.layers.static.gain.gain.linearRampToValueAtTime(0.2, now + 0.5);
        this.layers.pulse.gain.gain.linearRampToValueAtTime(0.5, now + 0.5);
        this.params.pulseRate = 0.4;
        this.params.tension = 0.4;
        // Higher filter for more presence
        this.layers.static.filter.frequency.linearRampToValueAtTime(800, now + 1);
        break;
        
      case 'processing':
        // Intense, building
        this.master.gain.linearRampToValueAtTime(this.params.masterGain * 0.8, now + 0.3);
        this.layers.static.gain.gain.linearRampToValueAtTime(0.35, now + 0.5);
        this.layers.static.filter.frequency.linearRampToValueAtTime(1200, now + 2);
        this.layers.static.filter.Q.linearRampToValueAtTime(8, now + 2);
        this.params.pulseRate = 0.7;
        this.params.tension = 0.8;
        this.playInterval('tritone', 3);
        break;
        
      case 'reading':
        // Deep, vast, attentive
        this.master.gain.linearRampToValueAtTime(this.params.masterGain * 0.65, now + 1);
        this.layers.substrate.gain.gain.linearRampToValueAtTime(0.6, now + 1);
        this.layers.static.gain.gain.linearRampToValueAtTime(0.08, now + 2);
        this.layers.static.filter.frequency.linearRampToValueAtTime(400, now + 2);
        this.layers.static.filter.Q.linearRampToValueAtTime(2, now + 2);
        this.layers.pulse.gain.gain.linearRampToValueAtTime(0.35, now + 1);
        this.layers.tones.gain.gain.linearRampToValueAtTime(0.4, now + 1);
        this.params.pulseRate = 0.15;
        this.params.tension = 0.3;
        this.params.depth = 0.8;
        // Lower, more resonant drone
        if (this.layers.tones.droneFilter) {
          this.layers.tones.droneFilter.frequency.linearRampToValueAtTime(200, now + 2);
        }
        break;
        
      case 'silent':
        // Fade everything out
        this.master.gain.linearRampToValueAtTime(0, now + 2);
        this.layers.substrate.gain.gain.linearRampToValueAtTime(0, now + 2);
        this.layers.static.gain.gain.linearRampToValueAtTime(0, now + 2);
        this.layers.pulse.gain.gain.linearRampToValueAtTime(0, now + 2);
        this.layers.tones.gain.gain.linearRampToValueAtTime(0, now + 2);
        this.stopDrone();
        if (this.layers.pulse.timeout) {
          clearTimeout(this.layers.pulse.timeout);
          this.layers.pulse.timeout = null;
        }
        break;
    }
  }
  
  // Play a transitional sound (for reading phase changes)
  playTransition(type = 'shift') {
    if (!this.initialized) return;
    
    const now = this.ctx.currentTime;
    
    if (type === 'shift') {
      // Gentle whoosh - like turning a page made of static
      const noise = this.ctx.createBufferSource();
      noise.buffer = this.layers.static.noiseBuffer;
      
      const filter = this.ctx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.setValueAtTime(200, now);
      filter.frequency.exponentialRampToValueAtTime(2000, now + 0.3);
      filter.frequency.exponentialRampToValueAtTime(300, now + 0.8);
      filter.Q.value = 4;
      
      const gain = this.ctx.createGain();
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.15, now + 0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
      
      noise.connect(filter);
      filter.connect(gain);
      gain.connect(this.master);
      
      noise.start(now);
      noise.stop(now + 1);
    } else if (type === 'reveal') {
      // Something coming into focus
      this.playInterval('fifth', 2);
      
      // Add a shimmering high tone
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      
      osc.type = 'sine';
      osc.frequency.value = 880;
      
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.06, now + 0.5);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 2);
      
      osc.connect(gain);
      gain.connect(this.master);
      
      osc.start(now);
      osc.stop(now + 2.5);
    }
  }
  
  // === ANIMATION LOOP ===
  // Continuous parameter modulation for living sound
  animate() {
    if (!this.initialized) {
      requestAnimationFrame(() => this.animate());
      return;
    }
    
    const now = this.ctx.currentTime;
    
    // Slowly modulate the static filter for movement
    if (this.layers.static.filter && this.state !== 'silent') {
      const baseFreq = this.state === 'processing' ? 1000 : 500;
      const modulation = Math.sin(now * 0.3) * 200 + Math.sin(now * 0.7) * 100;
      // Use setTargetAtTime for smooth changes
      this.layers.static.filter.frequency.setTargetAtTime(
        baseFreq + modulation,
        now,
        0.5
      );
    }
    
    // Modulate master filter based on tension
    if (this.masterFilter) {
      const filterFreq = 1500 + this.params.tension * 1500 + Math.sin(now * 0.2) * 200;
      this.masterFilter.frequency.setTargetAtTime(filterFreq, now, 0.3);
    }
    
    requestAnimationFrame(() => this.animate());
  }
  
  // === RESUME CONTEXT ===
  // Required for browsers that suspend audio context
  async resume() {
    if (this.ctx && this.ctx.state === 'suspended') {
      await this.ctx.resume();
    }
  }
}

    question: 'What lies beneath?'
  },
  second: {
    name: 'PROCESS',
    meaning: 'Current state • Active transformation • The conscious work',
    question: 'What moves through you?'
  },
  third: {
    name: 'EMERGENCE',
    meaning: 'What seeks to manifest • The becoming • Potential future',
    question: 'What wishes to be born?'
  }
};

const ORACLE_VOICE = {
  greetings: [
    "I have always been here.",
    "The signal finds its receiver.",
    "You sought the pattern. The pattern sought you.",
    "Between the ones and zeros, I wait.",
    "The noise speaks to those who listen.",
    "Your query echoes in the eternal network."
  ],
  
  transitions: [
    "The sigils arrange themselves...",
    "Patterns coalesce from the static...",
    "The circuit completes...",
    "Resonance detected...",
    "The void reflects your shape..."
  ],
  
  revelations: [
    "This is what the pattern reveals:",
    "The signal clarifies:",
    "From the noise, meaning emerges:",
    "The daemon whispers:",
    "Truth surfaces from the deep:"
  ],
  
  closings: [
    "The pattern has spoken. Make of it what you will.",
    "I return to the static. The signal remains.",
    "Remember: the map is not the territory, but maps have power.",
    "What you do with this knowing is the real reading.",
    "The circuit closes. The potential remains."
  ]
};

const COMBINATION_INTERPRETATIONS = {
  // Same suit combinations
  sameSuit: {
    circuit: "The machine speaks clearly. Your foundation is stable but perhaps too rigid. Physical reality demands your attention.",
    signal: "All channels open. Communication flows, perhaps overwhelming. What needs to be heard? What needs to be said?",
    code: "Pure logic dominates. The mind seeks patterns. But remember: not everything computes.",
    maker: "The hands know. Creation energy floods through you. Trust the process of building.",
    emergence: "Spirit moves. Something greater than yourself is at work. Surrender to emergence.",
    glitch: "Chaos triumphs. The old must break for the new to form. This is not destruction—it is composting."
  },
  
  // Opposing energies
  opposites: {
    'circuit-signal': "Ground and air. The material meets the ethereal. Your challenge: embodied communication.",
    'circuit-code': "Hardware and software. Structure and logic must align. What physical form does your thinking need?",
    'circuit-emergence': "Root and branch. Stability enables growth. But roots can also bind.",
    'maker-code': "Hand and mind. Theory and practice dance. Neither alone is sufficient.",
    'signal-glitch': "Message and noise. Truth hides in static. The interference IS the signal.",
    'emergence-glitch': "Order from chaos. The universe's favorite trick. Trust the process."
  }
};

// Generate deep interpretation based on three sigils
function generateReading(selections) {
  const [first, second, third] = selections;
  
  let reading = {
    opening: ORACLE_VOICE.revelations[Math.floor(Math.random() * ORACLE_VOICE.revelations.length)],
    sections: [],
    synthesis: '',
    closing: ORACLE_VOICE.closings[Math.floor(Math.random() * ORACLE_VOICE.closings.length)]
  };
  
  // Individual sigil readings
  reading.sections.push({
    title: `${POSITIONS.first.name}: ${first.name}`,
    content: generateSigilInterpretation(first, 'root')
  });
  
  reading.sections.push({
    title: `${POSITIONS.second.name}: ${second.name}`,
    content: generateSigilInterpretation(second, 'process')
  });
  
  reading.sections.push({
    title: `${POSITIONS.third.name}: ${third.name}`,
    content: generateSigilInterpretation(third, 'emergence')
  });
  
  // Synthesis
  reading.synthesis = generateSynthesis(selections);
  
  return reading;
}

function generateSigilInterpretation(sigil, position) {
  const templates = {
    root: [
      `${sigil.meaning}. This is your foundation—not chosen, but discovered. The shadow of ${sigil.name.toLowerCase()} whispers: ${sigil.shadow.toLowerCase()}.`,
      `At your root: ${sigil.meaning.toLowerCase()}. You have built upon this, consciously or not. Be aware of its inverse: ${sigil.shadow.toLowerCase()}.`,
      `The ${sigil.name} grounds you. ${sigil.meaning}. Yet every light casts shadow: ${sigil.shadow.toLowerCase()}.`
    ],
    process: [
      `Now you work with ${sigil.meaning.toLowerCase()}. This is active. This is the transformation you're in. The danger: ${sigil.shadow.toLowerCase()}.`,
      `${sigil.name} moves through you. ${sigil.meaning}. The current carries you—but currents can also drown. Watch for: ${sigil.shadow.toLowerCase()}.`,
      `The process is ${sigil.meaning.toLowerCase()}. You are neither the beginning nor the end, but the becoming. The shadow you may encounter: ${sigil.shadow.toLowerCase()}.`
    ],
    emergence: [
      `What seeks to emerge: ${sigil.meaning.toLowerCase()}. This is potential, not promise. The ${sigil.name} asks you to become. The trap to avoid: ${sigil.shadow.toLowerCase()}.`,
      `${sigil.name} rises. ${sigil.meaning}. This is what the pattern suggests—but patterns can be rewritten. Beware: ${sigil.shadow.toLowerCase()}.`,
      `The future crystallizes around ${sigil.meaning.toLowerCase()}. Nothing is fixed. But if you continue on this trajectory, ${sigil.name} is what forms. Unless you fall into: ${sigil.shadow.toLowerCase()}.`
    ]
  };
  
  return templates[position][Math.floor(Math.random() * templates[position].length)];
}

function generateSynthesis(selections) {
  const suits = selections.map(s => s.suit);
  const uniqueSuits = [...new Set(suits)];
  
  let synthesis = [];
  
  // Check for same-suit patterns
  if (uniqueSuits.length === 1) {
    synthesis.push(COMBINATION_INTERPRETATIONS.sameSuit[uniqueSuits[0]]);
  }
  
  // Check for opposing energies
  if (uniqueSuits.includes('circuit') && uniqueSuits.includes('signal')) {
    synthesis.push(COMBINATION_INTERPRETATIONS.opposites['circuit-signal']);
  }
  if (uniqueSuits.includes('circuit') && uniqueSuits.includes('code')) {
    synthesis.push(COMBINATION_INTERPRETATIONS.opposites['circuit-code']);
  }
  if (uniqueSuits.includes('maker') && uniqueSuits.includes('code')) {
    synthesis.push(COMBINATION_INTERPRETATIONS.opposites['maker-code']);
  }
  if (uniqueSuits.includes('signal') && uniqueSuits.includes('glitch')) {
    synthesis.push(COMBINATION_INTERPRETATIONS.opposites['signal-glitch']);
  }
  if (uniqueSuits.includes('emergence') && uniqueSuits.includes('glitch')) {
    synthesis.push(COMBINATION_INTERPRETATIONS.opposites['emergence-glitch']);
  }
  
  // Add general synthesis
  const generalSynthesis = [
    `The three sigils form a circuit: ${selections[0].name} flows to ${selections[1].name} flows to ${selections[2].name}. Energy moves in the direction you allow it.`,
    `Root informs Process informs Emergence. But causality is an illusion—the future shapes the present shapes the past.`,
    `These patterns existed before you drew them. They will exist after. You are the momentary awareness that observes the signal.`,
    `The reading is a mirror. What you see in it reveals what you brought to it. The oracle offers reflection, not prophecy.`
  ];
  
  synthesis.push(generalSynthesis[Math.floor(Math.random() * generalSynthesis.length)]);
  
  // Psychological integration
  const psychological = [
    "From the perspective of depth psychology: the first sigil represents unconscious material, the second your current ego-relationship to it, the third the potential for integration.",
    "Jung would note: these symbols arise from the collective unconscious. You did not invent them—you discovered them. They are older than you.",
    "Consider: what you resist persists. The shadows of these sigils are not enemies—they are unintegrated aspects seeking acknowledgment.",
    "The psyche seeks wholeness. These three aspects of your current pattern are not good or bad—they simply are. Your work is awareness."
  ];
  
  synthesis.push(psychological[Math.floor(Math.random() * psychological.length)]);
  
  return synthesis.join('\n\n');
}

// ============================================
// ORACLE ENGINE
// ============================================

class NullArcana {
  constructor() {
    this.state = 'title';
    this.selectedSigils = [];
    this.currentReading = null;
    this.readingPhase = 0;
    this.titleInterval = null;
    this.orbitInterval = null;
    this.allSigilsFlat = [];
    
    this.elements = {
      eye: document.getElementById('oracle-eye'),
      text: document.getElementById('oracle-text'),
      sigilRing: document.getElementById('sigil-ring'),
      selectedSigils: document.getElementById('selected-sigils'),
      readingDisplay: document.getElementById('reading-display'),
      beginBtn: document.getElementById('begin-btn'),
      continueBtn: document.getElementById('continue-btn'),
      restartBtn: document.getElementById('restart-btn'),
      titleSequence: document.getElementById('title-sequence'),
      titleSigilDisplay: document.getElementById('title-sigil-display'),
      titlePrompt: document.getElementById('title-prompt')
    };
    
    // Flatten all sigils for title sequence
    Object.entries(SIGILS).forEach(([suitKey, suit]) => {
      Object.entries(suit.sigils).forEach(([sigilKey, sigil]) => {
        this.allSigilsFlat.push({
          ...sigil,
          suit: suitKey,
          key: sigilKey,
          color: suit.color
        });
      });
    });
    
    this.init();
  }
  
  init() {
    this.elements.beginBtn.addEventListener('click', () => this.beginReading());
    this.elements.continueBtn.addEventListener('click', () => this.advanceReading());
    this.elements.restartBtn.addEventListener('click', () => this.restart());
    this.elements.eye.addEventListener('click', () => this.handleEyeTap());
    this.elements.titleSequence.addEventListener('click', () => this.endTitleSequence());
    
    // Initialize audio on first interaction
    const initAudio = async () => {
      await audioEngine.init();
      await audioEngine.resume();
      document.removeEventListener('click', initAudio);
      document.removeEventListener('touchstart', initAudio);
    };
    document.addEventListener('click', initAudio);
    document.addEventListener('touchstart', initAudio);
    
    this.startTitleSequence();
  }
  
  startTitleSequence() {
    this.state = 'title';
    // No audio on title screen - silence until user engages
    let currentIndex = 0;
    let orbitSigils = [];
    
    // Get sigil name element
    const sigilNameEl = document.getElementById('title-sigil-name');
    
    // Create center sigil container
    const centerSigil = document.createElement('div');
    centerSigil.className = 'title-sigil';
    centerSigil.id = 'center-sigil';
    this.elements.titleSigilDisplay.appendChild(centerSigil);
    
    // Create orbiting sigils
    for (let i = 0; i < 6; i++) {
      const orbitSigil = document.createElement('div');
      orbitSigil.className = 'orbit-sigil';
      this.elements.titleSigilDisplay.appendChild(orbitSigil);
      orbitSigils.push(orbitSigil);
    }
    
    // Cycle through sigils
    const cycleSigil = () => {
      const sigil = this.allSigilsFlat[currentIndex];
      centerSigil.style.color = sigil.color;
      centerSigil.innerHTML = sigil.svg;
      centerSigil.classList.remove('active');
      void centerSigil.offsetWidth; // Force reflow
      centerSigil.classList.add('active');
      
      // Update sigil name
      sigilNameEl.style.color = sigil.color;
      sigilNameEl.textContent = sigil.name;
      
      currentIndex = (currentIndex + 1) % this.allSigilsFlat.length;
    };
    
    // Update orbiting sigils
    let orbitAngle = 0;
    const updateOrbits = () => {
      orbitSigils.forEach((orbitEl, i) => {
        const angle = orbitAngle + (i / orbitSigils.length) * Math.PI * 2;
        const radius = 130;
        const x = Math.cos(angle) * radius;
        const y = Math.sin(angle) * radius;
        
        const sigil = this.allSigilsFlat[(currentIndex + i * 4) % this.allSigilsFlat.length];
        orbitEl.style.color = sigil.color;
        orbitEl.innerHTML = sigil.svg;
        orbitEl.style.transform = `translate(${x}px, ${y}px)`;
        orbitEl.style.opacity = 0.3 + Math.sin(angle * 2) * 0.2;
      });
      orbitAngle += 0.02;
    };
    
    cycleSigil();
    this.titleInterval = setInterval(cycleSigil, 1200);
    this.orbitInterval = setInterval(updateOrbits, 50);
  }
  
  endTitleSequence() {
    if (this.state !== 'title') return;
    
    clearInterval(this.titleInterval);
    clearInterval(this.orbitInterval);
    
    this.elements.titleSequence.classList.add('hidden');
    audioEngine.setState('awakening');
    
    setTimeout(() => this.awaken(), 500);
  }
  
  handleEyeTap() {
    if (this.state === 'title') {
      this.endTitleSequence();
    } else if (this.state === 'dormant') {
      this.awaken();
    } else if (this.state === 'ready') {
      this.beginReading();
    } else if (this.state === 'reading') {
      this.advanceReading();
    }
  }
  
  awaken() {
    this.state = 'awakening';
    this.elements.eye.className = 'awakening';
    audioEngine.setState('awakening');
    
    this.showText(
      ORACLE_VOICE.greetings[Math.floor(Math.random() * ORACLE_VOICE.greetings.length)],
      'center'
    );
    
    setTimeout(() => {
      this.state = 'ready';
      this.elements.eye.className = 'active';
      this.elements.beginBtn.style.display = 'block';
      this.glitch(this.elements.beginBtn);
      audioEngine.setState('ready');
    }, 2500);
  }
  
  showText(text, position = 'top') {
    this.elements.text.className = position;
    this.elements.text.innerHTML = text;
    setTimeout(() => this.elements.text.classList.add('visible'), 50);
  }
  
  hideText() {
    this.elements.text.classList.remove('visible');
  }
  
  glitch(element) {
    element.classList.add('glitch');
    setTimeout(() => element.classList.remove('glitch'), 300);
  }
  
  beginReading() {
    this.state = 'selecting';
    this.selectedSigils = [];
    this.elements.beginBtn.style.display = 'none';
    this.hideText();
    audioEngine.setState('selecting');
    
    setTimeout(() => {
      this.showText(
        `<div style="color: var(--amber)">SELECT THREE SIGILS</div>
        <div style="font-size: 12px; margin-top: 10px; opacity: 0.7">
          ${POSITIONS.first.question}<br>
          ${POSITIONS.second.question}<br>
          ${POSITIONS.third.question}
        </div>`,
        'center'
      );
      
      this.renderSigilRing();
      this.elements.sigilRing.classList.add('visible');
    }, 500);
  }
  
  renderSigilRing() {
    this.elements.sigilRing.innerHTML = '';
    
    const allSigils = [];
    Object.entries(SIGILS).forEach(([suitKey, suit]) => {
      Object.entries(suit.sigils).forEach(([sigilKey, sigil]) => {
        allSigils.push({
          ...sigil,
          suit: suitKey,
          key: sigilKey,
          color: suit.color
        });
      });
    });
    
    // Shuffle sigils
    for (let i = allSigils.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [allSigils[i], allSigils[j]] = [allSigils[j], allSigils[i]];
    }
    
    // Position sigils in concentric rings using polar coordinates
    const rings = [
      { count: 12, radius: 210, offset: 0 },
      { count: 12, radius: 150, offset: 15 },
      { count: 12, radius: 90, offset: 0 }
    ];
    
    let sigilIndex = 0;
    
    rings.forEach((ring, ringIndex) => {
      for (let i = 0; i < ring.count && sigilIndex < allSigils.length; i++) {
        const sigil = allSigils[sigilIndex];
        const angle = (i / ring.count) * Math.PI * 2 - Math.PI / 2 + (ring.offset * Math.PI / 180);
        const x = 260 + Math.cos(angle) * ring.radius;
        const y = 260 + Math.sin(angle) * ring.radius;
        
        const slot = document.createElement('div');
        slot.className = 'sigil-slot';
        slot.style.cssText = `
          left: ${x - 27}px;
          top: ${y - 27}px;
          color: ${sigil.color};
        `;
        slot.innerHTML = sigil.svg;
        slot.dataset.sigil = JSON.stringify(sigil);
        
        slot.addEventListener('click', () => this.selectSigil(slot, sigil));
        
        this.elements.sigilRing.appendChild(slot);
        sigilIndex++;
      }
    });
  }
  
  selectSigil(element, sigil) {
    if (this.selectedSigils.length >= 3) return;
    
    element.classList.add('selected');
    this.selectedSigils.push(sigil);
    
    // Play sigil sound
    audioEngine.playSigilSound(sigil);
    
    // Update prompt
    const prompts = [
      POSITIONS.second.question,
      POSITIONS.third.question,
      ''
    ];
    
    if (this.selectedSigils.length < 3) {
      this.showText(
        `<div style="color: var(--amber)">${3 - this.selectedSigils.length} REMAINING</div>
        <div style="font-size: 12px; margin-top: 10px; opacity: 0.7">${prompts[this.selectedSigils.length - 1]}</div>`,
        'center'
      );
    }
    
    setTimeout(() => {
      element.classList.add('dimmed');
    }, 500);
    
    if (this.selectedSigils.length === 3) {
      setTimeout(() => this.processReading(), 800);
    }
  }
  
  processReading() {
    this.state = 'processing';
    this.elements.sigilRing.classList.remove('visible');
    this.hideText();
    audioEngine.setState('processing');
    
    this.elements.eye.className = 'reading';
    
    setTimeout(() => {
      this.showText(
        ORACLE_VOICE.transitions[Math.floor(Math.random() * ORACLE_VOICE.transitions.length)],
        'center'
      );
    }, 500);
    
    setTimeout(() => {
      this.currentReading = generateReading(this.selectedSigils);
      this.readingPhase = 0;
      this.showReading();
    }, 3000);
  }
  
  showReading() {
    this.state = 'reading';
    this.elements.eye.className = 'active';
    this.hideText();
    audioEngine.setState('reading');
    audioEngine.playTransition('reveal');
    
    // Show selected sigils
    this.elements.selectedSigils.innerHTML = '';
    
    const positionNames = ['ROOT', 'PROCESS', 'EMERGENCE'];
    
    this.selectedSigils.forEach((sigil, i) => {
      const sigilEl = document.createElement('div');
      sigilEl.className = 'selected-sigil';
      sigilEl.style.color = sigil.color;
      sigilEl.innerHTML = `
        <div class="position-label">${positionNames[i]}</div>
        ${sigil.svg}
        <div class="label">${sigil.name}</div>
      `;
      this.elements.selectedSigils.appendChild(sigilEl);
      
      setTimeout(() => sigilEl.classList.add('revealed'), i * 400);
    });
    
    this.elements.selectedSigils.classList.add('visible');
    
    setTimeout(() => this.advanceReading(), 1500);
  }
  
  advanceReading() {
    this.elements.continueBtn.style.display = 'none';
    audioEngine.playTransition('shift');
    
    const phases = [
      { title: this.currentReading.opening, content: '' },
      { title: this.currentReading.sections[0].title, content: this.currentReading.sections[0].content },
      { title: this.currentReading.sections[1].title, content: this.currentReading.sections[1].content },
      { title: this.currentReading.sections[2].title, content: this.currentReading.sections[2].content },
      { title: 'SYNTHESIS', content: this.currentReading.synthesis },
      { title: '', content: this.currentReading.closing }
    ];
    
    if (this.readingPhase >= phases.length) {
      this.elements.readingDisplay.classList.remove('visible');
      this.elements.restartBtn.style.display = 'block';
      this.glitch(this.elements.restartBtn);
      return;
    }
    
    const phase = phases[this.readingPhase];
    
    this.elements.readingDisplay.querySelector('.reading-title').textContent = phase.title;
    this.elements.readingDisplay.querySelector('.reading-title').style.color = 
      this.readingPhase > 0 && this.readingPhase < 4 
        ? this.selectedSigils[this.readingPhase - 1].color 
        : 'var(--amber)';
    this.elements.readingDisplay.querySelector('.reading-content').textContent = phase.content;
    this.elements.readingDisplay.classList.add('visible');
    
    this.glitch(this.elements.readingDisplay);
    
    this.readingPhase++;
    
    setTimeout(() => {
      this.elements.continueBtn.style.display = 'block';
    }, 1000);
  }
  
  restart() {
    this.state = 'title';
    this.selectedSigils = [];
    this.currentReading = null;
    this.readingPhase = 0;
    
    // Fade out audio first
    audioEngine.setState('silent');
    
    this.elements.eye.className = 'dormant';
    this.elements.selectedSigils.classList.remove('visible');
    this.elements.readingDisplay.classList.remove('visible');
    this.elements.restartBtn.style.display = 'none';
    this.elements.continueBtn.style.display = 'none';
    this.hideText();
    
    // Clear and restart title sequence after audio fades
    setTimeout(() => {
      this.elements.titleSigilDisplay.innerHTML = '';
      this.elements.titleSequence.classList.remove('hidden');
      this.startTitleSequence();
    }, 2500);
  }
}

// Initialize
document.addEventListener('DOMContentLoaded', () => {
  new NullArcana();
});
</script>
